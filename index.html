<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpendWise Tracker - Standalone</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone@7.23.10/babel.min.js"></script>
    <!-- jsPDF for Reports -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
    <!-- Day.js for Date Management (More CDN friendly than date-fns) -->
    <script src="https://cdn.jsdelivr.net/npm/dayjs@1.11.10/dayjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dayjs@1.11.10/plugin/isBetween.js"></script>
    <script>dayjs.extend(window.dayjs_plugin_isBetween)</script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; margin: 0; padding: 0; }
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        input[type="date"] { appearance: none; -webkit-appearance: none; }
        #error-display { display: none; padding: 20px; margin: 20px; background: #fef2f2; border: 1px solid #fee2e2; border-radius: 12px; color: #991b1b; font-family: monospace; white-space: pre-wrap; }
    </style>
</head>
<body>
    <div id="error-display"></div>
    <div id="root">
        <div style="display: flex; justify-content: center; align-items: center; height: 100vh; color: #64748b; font-family: sans-serif;">
            <div style="text-align: center;">
                <p style="margin-bottom: 10px;">Loading SpendWise...</p>
                <p style="font-size: 12px; color: #94a3b8;">If this takes too long, check your internet connection.</p>
            </div>
        </div>
    </div>

    <script>
        // Global error handler to catch issues before React/Babel even start
        window.onerror = function(msg, url, lineNo, columnNo, error) {
            const display = document.getElementById('error-display');
            display.style.display = 'block';
            display.innerHTML = `<strong>Runtime Error:</strong>\n${msg}\nLine: ${lineNo}, Col: ${columnNo}\n\nThis usually happens if a library failed to load or there is a syntax error.`;
            return false;
        };
    </script>

    <script type="text/babel">
        // Safety check for libraries
        const requiredLibs = {
            'React': window.React,
            'ReactDOM': window.ReactDOM,
            'dayjs': window.dayjs,
            'jspdf': window.jspdf
        };

        const missingLibs = Object.entries(requiredLibs)
            .filter(([name, lib]) => !lib)
            .map(([name]) => name);

        if (missingLibs.length > 0) {
            document.getElementById('root').innerHTML = `
                <div style="padding: 40px; text-align: center; color: #ef4444; font-family: sans-serif;">
                    <h2 style="margin-bottom: 10px;">Failed to load SpendWise</h2>
                    <p style="color: #64748b;">The following libraries could not be loaded: ${missingLibs.join(', ')}</p>
                    <p style="margin-top: 20px; font-size: 14px; color: #94a3b8;">Please ensure you have an active internet connection and refresh the page.</p>
                </div>
            `;
            throw new Error("Missing libraries: " + missingLibs.join(', '));
        }

        const { useState, useEffect, useMemo } = React;
        const STORAGE_KEY = 'spendwise_v2_data';

        // Custom SVG Icons
        const Icons = {
            Wallet: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 12V7H5a2 2 0 0 1 0-4h14v4"/><path d="M3 5v14a2 2 0 0 0 2 2h16v-5"/><path d="M18 12a2 2 0 0 0 0 4h4v-4Z"/></svg>,
            Plus: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg>,
            Trash: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg>,
            Download: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>,
            Upload: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/></svg>,
            ChevronLeft: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m15 18-6-6 6-6"/></svg>,
            ChevronRight: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m9 18 6-6-6-6"/></svg>,
            TrendingUp: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>,
            TrendingDown: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="22 17 13.5 8.5 8.5 13.5 2 7"/><polyline points="16 17 22 17 22 11"/></svg>,
            FileText: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><line x1="16" x2="8" y1="13" y2="13"/><line x1="16" x2="8" y1="17" y2="17"/><line x1="10" x2="8" y1="9" y2="9"/></svg>,
            CreditCard: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="20" height="14" x="2" y="5" rx="2"/><line x1="2" x2="22" y1="10" y2="10"/></svg>,
            Target: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>,
            Settings: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
        };

        function App() {
            const [transactions, setTransactions] = useState([]);
            const [savingsGoals, setSavingsGoals] = useState([]);
            const [currentMonth, setCurrentMonth] = useState(new Date());
            const [showForm, setShowForm] = useState(false);
            const [showGoalForm, setShowGoalForm] = useState(false);
            const [formData, setFormData] = useState({
                description: '',
                amount: '',
                type: 'spending',
                category: 'General',
                date: dayjs().format('YYYY-MM-DD')
            });
            const [goalData, setGoalData] = useState({ name: '', target: '', current: '' });

            useEffect(() => {
                const savedData = localStorage.getItem(STORAGE_KEY);
                const savedGoals = localStorage.getItem(STORAGE_KEY + '_goals');
                if (savedData) {
                    try { setTransactions(JSON.parse(savedData)); } catch(e) { console.error(e); }
                }
                if (savedGoals) {
                    try { setSavingsGoals(JSON.parse(savedGoals)); } catch(e) { console.error(e); }
                }
            }, []);

            useEffect(() => {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(transactions));
                localStorage.setItem(STORAGE_KEY + '_goals', JSON.stringify(savingsGoals));
            }, [transactions, savingsGoals]);

            const monthlyTransactions = useMemo(() => {
                const start = dayjs(currentMonth).startOf('month');
                const end = dayjs(currentMonth).endOf('month');
                return transactions.filter(t => {
                    const d = dayjs(t.date);
                    return d.isBetween(start, end, null, '[]');
                });
            }, [transactions, currentMonth]);

            const summary = useMemo(() => {
                const income = monthlyTransactions.filter(t => t.type === 'income').reduce((s, t) => s + t.amount, 0);
                const bills = monthlyTransactions.filter(t => t.type === 'bill').reduce((s, t) => s + t.amount, 0);
                const spending = monthlyTransactions.filter(t => t.type === 'spending').reduce((s, t) => s + t.amount, 0);
                return { income, bills, spending, balance: income - bills - spending };
            }, [monthlyTransactions]);

            const trendData = useMemo(() => {
                const months = [];
                for (let i = 5; i >= 0; i--) {
                    const m = dayjs().subtract(i, 'month');
                    const start = m.startOf('month');
                    const end = m.endOf('month');
                    const mTrans = transactions.filter(t => dayjs(t.date).isBetween(start, end, null, '[]'));
                    const income = mTrans.filter(t => t.type === 'income').reduce((s, t) => s + t.amount, 0);
                    const expenses = mTrans.filter(t => t.type !== 'income').reduce((s, t) => s + t.amount, 0);
                    months.push({ label: m.format('MMM'), income, expenses });
                }
                return months;
            }, [transactions]);

            const handleAdd = (e) => {
                e.preventDefault();
                if (!formData.description || !formData.amount) return;
                const newT = {
                    id: Date.now().toString() + Math.random().toString(36).substr(2, 5),
                    ...formData,
                    amount: parseFloat(formData.amount)
                };
                setTransactions([newT, ...transactions]);
                setShowForm(false);
                setFormData({ ...formData, description: '', amount: '' });
            };

            const handleAddGoal = (e) => {
                e.preventDefault();
                if (!goalData.name || !goalData.target) return;
                const newGoal = {
                    id: Date.now().toString(),
                    name: goalData.name,
                    target: parseFloat(goalData.target),
                    current: parseFloat(goalData.current || 0)
                };
                setSavingsGoals([...savingsGoals, newGoal]);
                setShowGoalForm(false);
                setGoalData({ name: '', target: '', current: '' });
            };

            const exportData = () => {
                const data = { transactions, savingsGoals, version: '2.0', exportDate: new Date().toISOString() };
                const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `SpendWise_Backup_${dayjs().format('YYYY-MM-DD')}.json`;
                a.click();
            };

            const importData = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const data = JSON.parse(event.target.result);
                        if (data.transactions) {
                            if (confirm("This will merge the imported data with your current data. Continue?")) {
                                setTransactions([...data.transactions, ...transactions]);
                                if (data.savingsGoals) setSavingsGoals([...data.savingsGoals, ...savingsGoals]);
                                alert("Data imported successfully!");
                            }
                        } else {
                            alert("Invalid backup file format.");
                        }
                    } catch (err) {
                        alert("Error reading file: " + err.message);
                    }
                };
                reader.readAsText(file);
            };

            const downloadPDF = () => {
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF();
                const monthStr = dayjs(currentMonth).format('MMMM YYYY');
                
                doc.setFontSize(20);
                doc.text(`SpendWise Report: ${monthStr}`, 14, 20);
                
                const summaryData = [
                    ['Income', `$${summary.income.toFixed(2)}`],
                    ['Bills', `$${summary.bills.toFixed(2)}`],
                    ['Spending', `$${summary.spending.toFixed(2)}`],
                    ['Balance', `$${summary.balance.toFixed(2)}`]
                ];

                doc.autoTable({
                    startY: 30,
                    head: [['Category', 'Amount']],
                    body: summaryData,
                    theme: 'striped',
                    headStyles: { fillColor: [16, 185, 129] }
                });

                const transData = monthlyTransactions
                    .sort((a, b) => dayjs(a.date).unix() - dayjs(b.date).unix())
                    .map(t => [
                        dayjs(t.date).format('MMM DD'),
                        t.description,
                        t.type.toUpperCase(),
                        `$${t.amount.toFixed(2)}`
                    ]);

                doc.text(`Transactions`, 14, doc.lastAutoTable.finalY + 15);
                doc.autoTable({
                    startY: doc.lastAutoTable.finalY + 20,
                    head: [['Date', 'Description', 'Type', 'Amount']],
                    body: transData,
                    theme: 'grid'
                });

                doc.save(`SpendWise_${dayjs(currentMonth).format('YYYY_MM')}.pdf`);
            };

            const copyPrev = () => {
                const prevMonth = dayjs(currentMonth).subtract(1, 'month');
                const start = prevMonth.startOf('month');
                const end = prevMonth.endOf('month');
                const items = transactions.filter(t => {
                    const d = dayjs(t.date);
                    return d.isBetween(start, end, null, '[]') && (t.type === 'income' || t.type === 'bill');
                });
                if (items.length === 0) return alert("No items found in last month.");
                const newItems = items.map(t => ({
                    ...t,
                    id: Date.now() + Math.random(),
                    date: dayjs(currentMonth).startOf('month').format('YYYY-MM-DD')
                }));
                setTransactions([...newItems, ...transactions]);
            };

            return (
                <div className="min-h-screen p-4 md:p-8 max-w-6xl mx-auto space-y-8 fade-in">
                    <header className="flex flex-col md:flex-row justify-between items-center gap-4">
                        <div className="flex items-center gap-3">
                            <div className="p-2 bg-emerald-600 text-white rounded-xl shadow-lg shadow-emerald-100">
                                <Icons.Wallet />
                            </div>
                            <div>
                                <h1 className="text-3xl font-light tracking-tight text-gray-800">SpendWise</h1>
                                <p className="text-[10px] text-gray-400 font-bold uppercase tracking-widest">Personal Finance Tracker</p>
                            </div>
                        </div>
                        <div className="flex items-center gap-4">
                            <div className="flex items-center gap-4 bg-white p-2 rounded-2xl shadow-sm border border-gray-100">
                                <button onClick={() => setCurrentMonth(dayjs(currentMonth).subtract(1, 'month').toDate())} className="p-2 hover:bg-gray-50 rounded-xl transition-colors"><Icons.ChevronLeft /></button>
                                <span className="font-medium min-w-[140px] text-center">{dayjs(currentMonth).format('MMMM YYYY')}</span>
                                <button onClick={() => setCurrentMonth(dayjs(currentMonth).add(1, 'month').toDate())} className="p-2 hover:bg-gray-50 rounded-xl transition-colors"><Icons.ChevronRight /></button>
                            </div>
                        </div>
                    </header>

                    <div className="grid grid-cols-1 md:grid-cols-4 gap-4">
                        <SummaryCard title="Income" amount={summary.income} color="text-emerald-600" icon={<Icons.TrendingUp />} onAdd={() => { setFormData({...formData, type: 'income'}); setShowForm(true); }} />
                        <SummaryCard title="Bills" amount={summary.bills} color="text-amber-600" icon={<Icons.FileText />} onAdd={() => { setFormData({...formData, type: 'bill'}); setShowForm(true); }} />
                        <SummaryCard title="Spending" amount={summary.spending} color="text-rose-600" icon={<Icons.TrendingDown />} onAdd={() => { setFormData({...formData, type: 'spending'}); setShowForm(true); }} />
                        <SummaryCard title="Balance" amount={summary.balance} color={summary.balance >= 0 ? "text-blue-600" : "text-red-600"} icon={<Icons.CreditCard />} highlight />
                    </div>

                    {monthlyTransactions.length === 0 && transactions.length > 0 && (
                        <div className="bg-emerald-50 border border-emerald-100 p-4 rounded-2xl flex items-center justify-between">
                            <p className="text-emerald-800 text-sm">Empty month. Copy income and bills from last month?</p>
                            <button onClick={copyPrev} className="bg-emerald-600 text-white px-4 py-2 rounded-xl text-sm font-medium hover:bg-emerald-700">Copy Previous</button>
                        </div>
                    )}

                    <div className="grid grid-cols-1 lg:grid-cols-12 gap-8">
                        {/* Sidebar */}
                        <div className="lg:col-span-3 space-y-6">
                            <div className="bg-white p-6 rounded-3xl shadow-sm border border-gray-100 space-y-4">
                                <button onClick={() => setShowForm(true)} className="w-full bg-emerald-600 text-white p-4 rounded-2xl shadow-lg hover:bg-emerald-700 transition-all flex justify-center items-center gap-2 font-medium">
                                    <Icons.Plus /> Add Transaction
                                </button>
                                <button onClick={downloadPDF} className="w-full bg-white border border-gray-200 text-gray-700 p-4 rounded-2xl hover:bg-gray-50 transition-all flex justify-center items-center gap-2 font-medium">
                                    <Icons.Download /> Monthly Report
                                </button>
                            </div>

                            <div className="bg-white p-6 rounded-3xl shadow-sm border border-gray-100">
                                <div className="flex justify-between items-center mb-6">
                                    <h3 className="text-xs font-bold text-gray-400 uppercase tracking-widest">Savings Goals</h3>
                                    <button onClick={() => setShowGoalForm(true)} className="text-emerald-600 hover:bg-emerald-50 p-1 rounded-lg transition-all"><Icons.Plus /></button>
                                </div>
                                <div className="space-y-6">
                                    {savingsGoals.length > 0 ? savingsGoals.map(goal => (
                                        <div key={goal.id} className="space-y-2 group/goal relative">
                                            <div className="flex justify-between text-xs font-medium">
                                                <span className="text-gray-700">{goal.name}</span>
                                                <span className="text-gray-400">${goal.current} / ${goal.target}</span>
                                            </div>
                                            <div className="w-full bg-gray-100 h-2 rounded-full overflow-hidden relative">
                                                <div className="h-full bg-blue-500 transition-all duration-700" style={{ width: `${Math.min((goal.current / goal.target) * 100, 100)}%` }}></div>
                                            </div>
                                            <div className="flex justify-end gap-2 opacity-0 group-hover/goal:opacity-100 transition-opacity">
                                                <button onClick={() => {
                                                    const val = prompt("Enter new current amount:", goal.current);
                                                    if (val !== null) {
                                                        setSavingsGoals(savingsGoals.map(g => g.id === goal.id ? {...g, current: parseFloat(val)} : g));
                                                    }
                                                }} className="text-[10px] text-blue-600 font-bold uppercase hover:underline">Update</button>
                                                <button onClick={() => {
                                                    if (confirm("Delete goal?")) {
                                                        setSavingsGoals(savingsGoals.filter(g => g.id !== goal.id));
                                                    }
                                                }} className="text-[10px] text-rose-600 font-bold uppercase hover:underline">Delete</button>
                                            </div>
                                        </div>
                                    )) : <p className="text-xs text-gray-400 italic">No goals set yet.</p>}
                                </div>
                            </div>

                            <div className="bg-white p-6 rounded-3xl shadow-sm border border-gray-100">
                                <h3 className="text-xs font-bold text-gray-400 uppercase tracking-widest mb-6">Backup & Tools</h3>
                                <div className="space-y-3">
                                    <button onClick={exportData} className="w-full flex items-center justify-between p-3 bg-gray-50 rounded-xl hover:bg-gray-100 transition-all text-sm font-medium text-gray-700">
                                        <span>Export Data</span>
                                        <Icons.Download />
                                    </button>
                                    <label className="w-full flex items-center justify-between p-3 bg-gray-50 rounded-xl hover:bg-gray-100 transition-all text-sm font-medium text-gray-700 cursor-pointer">
                                        <span>Import Data</span>
                                        <Icons.Upload />
                                        <input type="file" accept=".json" onChange={importData} className="hidden" />
                                    </label>
                                </div>
                            </div>
                        </div>

                        {/* Main Content */}
                        <div className="lg:col-span-9 space-y-8">
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                <div className="bg-white p-6 rounded-3xl shadow-sm border border-gray-100">
                                    <h3 className="text-xs font-bold text-gray-400 uppercase tracking-widest mb-6">6-Month Trend</h3>
                                    <div className="flex items-end justify-between h-32 gap-2">
                                        {trendData.map((m, i) => {
                                            const max = Math.max(...trendData.map(d => Math.max(d.income, d.expenses))) || 1;
                                            return (
                                                <div key={i} className="flex-1 flex flex-col items-center gap-2 group relative">
                                                    <div className="w-full flex gap-0.5 justify-center items-end h-full">
                                                        <div className="w-2 bg-emerald-400 rounded-t-sm" style={{ height: `${(m.income / max) * 100}%` }}></div>
                                                        <div className="w-2 bg-rose-400 rounded-t-sm" style={{ height: `${(m.expenses / max) * 100}%` }}></div>
                                                    </div>
                                                    <span className="text-[10px] font-bold text-gray-400 uppercase">{m.label}</span>
                                                    <div className="absolute bottom-full mb-2 bg-gray-800 text-white text-[10px] p-2 rounded opacity-0 group-hover:opacity-100 transition-opacity pointer-events-none z-10 whitespace-nowrap">
                                                        In: ${m.income.toFixed(0)}<br/>Out: ${m.expenses.toFixed(0)}
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>

                                <div className="bg-white p-6 rounded-3xl shadow-sm border border-gray-100">
                                    <h3 className="text-xs font-bold text-gray-400 uppercase tracking-widest mb-6">Budget Health</h3>
                                    <div className="space-y-6">
                                        <ProgressBar label="Income Used" value={summary.bills + summary.spending} max={summary.income} color={summary.bills + summary.spending > summary.income ? "bg-red-500" : "bg-emerald-500"} />
                                        <div className="flex justify-between items-center pt-2">
                                            <div className="text-center">
                                                <p className="text-xs text-gray-400 font-bold uppercase">Savings Rate</p>
                                                <p className="text-xl font-mono text-blue-600">{summary.income > 0 ? Math.max(0, ((summary.balance / summary.income) * 100)).toFixed(1) : 0}%</p>
                                            </div>
                                            <div className="text-center">
                                                <p className="text-xs text-gray-400 font-bold uppercase">Daily Budget</p>
                                                <p className="text-xl font-mono text-gray-800">${summary.income > 0 ? (summary.balance / 30).toFixed(2) : '0.00'}</p>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div className="bg-white rounded-3xl shadow-sm border border-gray-100 overflow-hidden flex flex-col">
                                <div className="p-6 border-b border-gray-50 flex justify-between items-center">
                                    <h2 className="text-xl font-medium">Monthly Activity</h2>
                                    <span className="text-xs text-gray-400 uppercase tracking-widest font-bold">{monthlyTransactions.length} Items</span>
                                </div>
                                <div className="divide-y divide-gray-50 max-h-[600px] overflow-y-auto no-scrollbar">
                                    {monthlyTransactions.length > 0 ? monthlyTransactions.sort((a, b) => dayjs(b.date).unix() - dayjs(a.date).unix()).map(t => (
                                        <div key={t.id} className="p-4 flex items-center justify-between hover:bg-gray-50 transition-colors group">
                                            <div className="flex items-center gap-4">
                                                <div className={`w-10 h-10 rounded-xl flex items-center justify-center ${t.type === 'income' ? 'bg-emerald-50 text-emerald-600' : t.type === 'bill' ? 'bg-amber-50 text-amber-600' : 'bg-rose-50 text-rose-600'}`}>
                                                    {t.type === 'income' ? <Icons.TrendingUp /> : t.type === 'bill' ? <Icons.FileText /> : <Icons.TrendingDown />}
                                                </div>
                                                <div>
                                                    <p className="font-medium text-sm">{t.description}</p>
                                                    <p className="text-xs text-gray-400 font-medium">{dayjs(t.date).format('MMM DD')} • {t.category}</p>
                                                </div>
                                            </div>
                                            <div className="flex items-center gap-4">
                                                <p className={`font-mono font-medium ${t.type === 'income' ? 'text-emerald-600' : 'text-gray-900'}`}>{t.type === 'income' ? '+' : '-'}${t.amount.toFixed(2)}</p>
                                                <button onClick={() => { if(confirm("Delete?")) setTransactions(transactions.filter(x => x.id !== t.id)) }} className="text-gray-300 hover:text-rose-500 opacity-0 group-hover:opacity-100 transition-all p-2"><Icons.Trash /></button>
                                            </div>
                                        </div>
                                    )) : <div className="p-20 text-center text-gray-400 italic">No transactions this month.</div>}
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* Modals */}
                    {showForm && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/40 backdrop-blur-sm">
                            <div className="bg-white w-full max-w-md rounded-3xl shadow-2xl p-8 space-y-6 fade-in">
                                <h2 className="text-2xl font-medium tracking-tight">New Transaction</h2>
                                <form onSubmit={handleAdd} className="space-y-4">
                                    <div className="space-y-1">
                                        <label className="text-[10px] uppercase tracking-widest text-gray-400 font-bold">Description</label>
                                        <input type="text" placeholder="e.g. Rent, Salary" required className="w-full p-3 bg-gray-50 rounded-xl outline-none focus:ring-2 focus:ring-emerald-500" value={formData.description} onChange={e => setFormData({...formData, description: e.target.value})} />
                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div className="space-y-1">
                                            <label className="text-[10px] uppercase tracking-widest text-gray-400 font-bold">Amount</label>
                                            <input type="number" step="0.01" placeholder="0.00" required className="w-full p-3 bg-gray-50 rounded-xl outline-none focus:ring-2 focus:ring-emerald-500" value={formData.amount} onChange={e => setFormData({...formData, amount: e.target.value})} />
                                        </div>
                                        <div className="space-y-1">
                                            <label className="text-[10px] uppercase tracking-widest text-gray-400 font-bold">Date</label>
                                            <input type="date" required className="w-full p-3 bg-gray-50 rounded-xl outline-none focus:ring-2 focus:ring-emerald-500" value={formData.date} onChange={e => setFormData({...formData, date: e.target.value})} />
                                        </div>
                                    </div>
                                    <div className="space-y-1">
                                        <label className="text-[10px] uppercase tracking-widest text-gray-400 font-bold">Type</label>
                                        <div className="grid grid-cols-3 gap-2">
                                            {['income', 'bill', 'spending'].map(type => (
                                                <button key={type} type="button" onClick={() => setFormData({...formData, type})} className={`p-2 rounded-xl text-xs capitalize border transition-all font-medium ${formData.type === type ? 'bg-emerald-600 border-emerald-600 text-white shadow-md' : 'bg-white border-gray-100 text-gray-600'}`}>{type}</button>
                                            ))}
                                        </div>
                                    </div>
                                    <div className="flex gap-3 pt-4">
                                        <button type="button" onClick={() => setShowForm(false)} className="flex-1 p-3 text-gray-500 hover:bg-gray-50 rounded-xl font-medium">Cancel</button>
                                        <button type="submit" className="flex-1 p-3 bg-emerald-600 text-white rounded-xl shadow-lg hover:bg-emerald-700 font-semibold">Save</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    {showGoalForm && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/40 backdrop-blur-sm">
                            <div className="bg-white w-full max-w-md rounded-3xl shadow-2xl p-8 space-y-6 fade-in">
                                <h2 className="text-2xl font-medium tracking-tight">New Savings Goal</h2>
                                <form onSubmit={handleAddGoal} className="space-y-4">
                                    <div className="space-y-1">
                                        <label className="text-[10px] uppercase tracking-widest text-gray-400 font-bold">Goal Name</label>
                                        <input type="text" placeholder="e.g. New Car, Emergency Fund" required className="w-full p-3 bg-gray-50 rounded-xl outline-none focus:ring-2 focus:ring-blue-500" value={goalData.name} onChange={e => setGoalData({...goalData, name: e.target.value})} />
                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div className="space-y-1">
                                            <label className="text-[10px] uppercase tracking-widest text-gray-400 font-bold">Target Amount</label>
                                            <input type="number" step="0.01" placeholder="0.00" required className="w-full p-3 bg-gray-50 rounded-xl outline-none focus:ring-2 focus:ring-blue-500" value={goalData.target} onChange={e => setGoalData({...goalData, target: e.target.value})} />
                                        </div>
                                        <div className="space-y-1">
                                            <label className="text-[10px] uppercase tracking-widest text-gray-400 font-bold">Current Savings</label>
                                            <input type="number" step="0.01" placeholder="0.00" className="w-full p-3 bg-gray-50 rounded-xl outline-none focus:ring-2 focus:ring-blue-500" value={goalData.current} onChange={e => setGoalData({...goalData, current: e.target.value})} />
                                        </div>
                                    </div>
                                    <div className="flex gap-3 pt-4">
                                        <button type="button" onClick={() => setShowGoalForm(false)} className="flex-1 p-3 text-gray-500 hover:bg-gray-50 rounded-xl font-medium">Cancel</button>
                                        <button type="submit" className="flex-1 p-3 bg-blue-600 text-white rounded-xl shadow-lg hover:bg-blue-700 font-semibold">Create Goal</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        }


        function SummaryCard({ title, amount, color, icon, highlight, onAdd }) {
            return (
                <div className={`bg-white p-6 rounded-3xl shadow-sm border border-gray-100 flex flex-col justify-between h-32 relative group ${highlight ? 'bg-gradient-to-br from-white to-gray-50 border-gray-200' : ''}`}>
                    <div className="flex justify-between items-start">
                        <span className="text-xs font-semibold uppercase tracking-widest text-gray-400">{title}</span>
                        <div className="p-2 bg-gray-50 rounded-xl text-gray-400">{icon}</div>
                    </div>
                    <div className="flex justify-between items-end">
                        <p className={`text-2xl font-mono tracking-tight ${color}`}>${amount.toFixed(2)}</p>
                        {onAdd && <button onClick={onAdd} className="p-1.5 bg-gray-50 text-gray-400 hover:text-emerald-600 hover:bg-emerald-50 rounded-lg transition-all opacity-0 group-hover:opacity-100"><Icons.Plus /></button>}
                    </div>
                </div>
            );
        }

        function ProgressBar({ label, value, max, color }) {
            const percentage = max > 0 ? Math.min((value / max) * 100, 100) : 0;
            return (
                <div className="space-y-2">
                    <div className="flex justify-between text-[10px] font-bold uppercase tracking-wider text-gray-500">
                        <span>{label}</span>
                        <span>${value.toLocaleString(undefined, {minimumFractionDigits: 2})}</span>
                    </div>
                    <div className="w-full bg-gray-100 h-1.5 rounded-full overflow-hidden">
                        <div className={`h-full ${color} transition-all duration-700 ease-out`} style={{ width: `${percentage}%` }}></div>
                    </div>
                </div>
            );
        }

        try {
            const root = ReactDOM.createRoot(document.getElementById('root'));
            root.render(<App />);
        } catch (err) {
            console.error("Render Error:", err);
            document.getElementById('error-display').style.display = 'block';
            document.getElementById('error-display').innerHTML = `<strong>Render Error:</strong>\n${err.message}`;
        }
    </script>

</body>
</html>
