<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpendWise Tracker - Standalone</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone@7.23.10/babel.min.js"></script>
    <!-- jsPDF for Reports -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
    <!-- Day.js for Date Management -->
    <script src="https://cdn.jsdelivr.net/npm/dayjs@1.11.10/dayjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dayjs@1.11.10/plugin/isBetween.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dayjs@1.11.10/plugin/customParseFormat.js"></script>
    <script>
        dayjs.extend(window.dayjs_plugin_isBetween);
        dayjs.extend(window.dayjs_plugin_customParseFormat);
    </script>
    <!-- Prop-Types for Recharts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prop-types/15.8.1/prop-types.min.js"></script>
    <!-- Recharts for Data Visualization -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.12.2/Recharts.min.js"></script>
    

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; margin: 0; padding: 0; }
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        input[type="date"] { appearance: none; -webkit-appearance: none; }
        #error-display { display: none; padding: 20px; margin: 20px; background: #fef2f2; border: 1px solid #fee2e2; border-radius: 12px; color: #991b1b; font-family: monospace; white-space: pre-wrap; }

        /* Splash Screen Animations */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in-up { animation: fadeInUp 1s ease-out forwards; opacity: 0; }
        
        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-30px) rotate(10deg); }
        }
        .animate-float { animation: float 8s ease-in-out infinite; }

        .glitch-text {
            position: relative;
            display: inline-block;
        }
        .glitch-text::before, .glitch-text::after {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: inherit;
        }
        .glitch-text::before {
            left: 2px;
            text-shadow: -2px 0 #10b981;
            clip: rect(44px, 450px, 56px, 0);
            animation: glitch-anim 5s infinite linear alternate-reverse;
        }
        .glitch-text::after {
            left: -2px;
            text-shadow: -2px 0 #3b82f6, 2px 2px #10b981;
            animation: glitch-anim2 1s infinite linear alternate-reverse;
        }
        @keyframes glitch-anim {
            0% { clip: rect(31px, 9999px, 94px, 0); transform: skew(0.85deg); }
            20% { clip: rect(70px, 9999px, 71px, 0); transform: skew(0.1deg); }
            40% { clip: rect(10px, 9999px, 33px, 0); transform: skew(0.5deg); }
            60% { clip: rect(80px, 9999px, 100px, 0); transform: skew(0.2deg); }
            80% { clip: rect(50px, 9999px, 66px, 0); transform: skew(0.9deg); }
            100% { clip: rect(67px, 9999px, 62px, 0); transform: skew(0.6deg); }
        }
        @keyframes glitch-anim2 {
            0% { clip: rect(65px, 9999px, 100px, 0); transform: skew(0.3deg); }
            20% { clip: rect(10px, 9999px, 30px, 0); transform: skew(0.1deg); }
            40% { clip: rect(40px, 9999px, 60px, 0); transform: skew(0.8deg); }
            60% { clip: rect(70px, 9999px, 90px, 0); transform: skew(0.4deg); }
            80% { clip: rect(20px, 9999px, 40px, 0); transform: skew(0.2deg); }
            100% { clip: rect(50px, 9999px, 70px, 0); transform: skew(0.5deg); }
        }
    </style>
</head>
<body>
    <div id="error-display"></div>
    <div id="root">
        <div style="display: flex; justify-content: center; align-items: center; height: 100vh; color: #64748b; font-family: sans-serif;">
            <div style="text-align: center;">
                <p style="margin-bottom: 10px;">Loading SpendWise...</p>
                <p style="font-size: 12px; color: #94a3b8;">If this takes too long, check your internet connection.</p>
            </div>
        </div>
    </div>

    <script>
        // Global error handler to catch issues before React/Babel even start
        window.onerror = function(msg, url, lineNo, columnNo, error) {
            const display = document.getElementById('error-display');
            display.style.display = 'block';
            display.innerHTML = `<strong>Runtime Error:</strong>\n${msg}\nLine: ${lineNo}, Col: ${columnNo}\n\nThis usually happens if a library failed to load or there is a syntax error.`;
            return false;
        };
    </script>

    <script type="text/babel">

        // Safety check for libraries
        const requiredLibs = {
            'React': window.React,
            'ReactDOM': window.ReactDOM,
            'dayjs': window.dayjs,
            'jspdf': window.jspdf,
            'PropTypes': window.PropTypes,
            'Recharts': window.Recharts
        };

        const missingLibs = Object.entries(requiredLibs)
            .filter(([name, lib]) => !lib)
            .map(([name]) => name);

        if (missingLibs.length > 0) {
            document.getElementById('root').innerHTML = `
                <div style="padding: 40px; text-align: center; color: #ef4444; font-family: sans-serif;">
                    <h2 style="margin-bottom: 10px;">Failed to load SpendWise</h2>
                    <p style="color: #64748b;">The following libraries could not be loaded: ${missingLibs.join(', ')}</p>
                    <p style="margin-top: 20px; font-size: 14px; color: #94a3b8;">Please ensure you have an active internet connection and refresh the page.</p>
                </div>
            `;
            throw new Error("Missing libraries: " + missingLibs.join(', '));
        }

        const { useState, useEffect, useMemo } = React;
        const STORAGE_KEY = 'spendwise_v2_data';

        const CATEGORIES_BY_TYPE = {
            income: ['Salary', 'Side Hustle', 'Freelance', 'Investment', 'Gift', 'Other'],
            bill: ['Rent', 'Housing', 'Utilities', 'Insurance', 'Subscription', 'Debt', 'Other'],
            spending: ['Food', 'Transport', 'Entertainment', 'Shopping', 'Health', 'Other']
        };

        const CATEGORIES = {
            Housing: { color: 'bg-blue-500', icon: '🏠' },
            Rent: { color: 'bg-indigo-600', icon: '🔑' },
            Utilities: { color: 'bg-cyan-500', icon: '⚡' },
            Food: { color: 'bg-orange-500', icon: '🍔' },
            Transport: { color: 'bg-purple-500', icon: '🚗' },
            Entertainment: { color: 'bg-pink-500', icon: '🎮' },
            Shopping: { color: 'bg-yellow-500', icon: '🛍️' },
            Health: { color: 'bg-red-500', icon: '🏥' },
            Subscriptions: { color: 'bg-slate-600', icon: '📺' },
            Salary: { color: 'bg-emerald-500', icon: '💵' },
            'Side Hustle': { color: 'bg-teal-500', icon: '🚀' },
            General: { color: 'bg-gray-500', icon: '📦' }
        };

        // Destructure Recharts components
        const { 
            ResponsiveContainer, BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, Legend, 
            PieChart, Pie, Cell, LineChart, Line, AreaChart, Area 
        } = window.Recharts;

        // Custom SVG Icons
        const Icons = {
            Wallet: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 12V7H5a2 2 0 0 1 0-4h14v4"/><path d="M3 5v14a2 2 0 0 0 2 2h16v-5"/><path d="M18 12a2 2 0 0 0 0 4h4v-4Z"/></svg>,
            Plus: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg>,
            Trash: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg>,
            Download: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>,
            Upload: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/></svg>,
            ChevronLeft: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m15 18-6-6 6-6"/></svg>,
            ChevronRight: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m9 18 6-6-6-6"/></svg>,
            ChevronDown: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m6 9 6 6 6-6"/></svg>,
            TrendingUp: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>,
            TrendingDown: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="22 17 13.5 8.5 8.5 13.5 2 7"/><polyline points="16 17 22 17 22 11"/></svg>,
            FileText: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><line x1="16" x2="8" y1="13" y2="13"/><line x1="16" x2="8" y1="17" y2="17"/><line x1="10" x2="8" y1="9" y2="9"/></svg>,
            CreditCard: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="20" height="14" x="2" y="5" rx="2"/><line x1="2" x2="22" y1="10" y2="10"/></svg>,
            Target: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>,
            Settings: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>,
            Bank: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="20" height="12" x="2" y="9" rx="2"/><path d="M11 13v4"/><path d="M15 13v4"/><path d="M7 13v4"/><path d="M2 9l10-7 10 7"/></svg>,
            Coins: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="8" cy="8" r="6"/><path d="M18.09 10.37A6 6 0 1 1 10.34 18"/><path d="M7 6h1v4"/><path d="m16.71 13.88.7.71-2.82 2.82"/></svg>,
            Gem: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M6 3h12l4 6-10 12L2 9Z"/><path d="M11 3 8 9l3 12"/><path d="M13 3l3 6-3 12"/><path d="M2 9h20"/></svg>,
            Lightbulb: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M15 14c.2-1 .7-1.7 1.5-2.5 1-.9 1.5-2.2 1.5-3.5A5 5 0 0 0 8 8c0 1.3.5 2.6 1.5 3.5.8.8 1.3 1.5 1.5 2.5"/><path d="M9 18h6"/><path d="M10 22h4"/></svg>,
            ExternalLink: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" x2="21" y1="14" y2="3"/></svg>,
            Check: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>,
            Alert: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></svg>,
            Calendar: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></svg>,
            Briefcase: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="20" height="14" x="2" y="7" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>,
            User: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>,
            Activity: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
        };

        const SAVING_FACTS = [
            "Saving just $5 a day can add up to over $1,800 in a year.",
            "The 50/30/20 rule suggests spending 50% on needs, 30% on wants, and 20% on savings.",
            "Automating your savings is one of the most effective ways to build wealth over time.",
            "An emergency fund should ideally cover 3 to 6 months of your essential living expenses.",
            "Compound interest is often called the eighth wonder of the world. Start saving early!",
            "Small changes, like making coffee at home, can save you hundreds of dollars each month.",
            "Reviewing your subscriptions once a month can help you find 'ghost' expenses you no longer use.",
            "Paying yourself first means putting money into savings as soon as soon as you get your paycheck."
        ];

        function App() {
            const [showSplash, setShowSplash] = useState(true);
            const [transactions, setTransactions] = useState([]);
            const [savingsGoals, setSavingsGoals] = useState([]);
            const [assets, setAssets] = useState([]);
            const [budgets, setBudgets] = useState({});
            const [wallets, setWallets] = useState([{ id: 'personal', name: 'Personal', icon: 'User' }, { id: 'business', name: 'Business', icon: 'Briefcase' }]);
            const [activeWalletId, setActiveWalletId] = useState('personal');
            const [debts, setDebts] = useState([]);
            const [monthlySavingsGoal, setMonthlySavingsGoal] = useState(0);
            const [currentMonth, setCurrentMonth] = useState(new Date());
            const [showForm, setShowForm] = useState(false);
            const [showGoalForm, setShowGoalForm] = useState(false);
            const [showAssetForm, setShowAssetForm] = useState(false);
            const [showDebtForm, setShowDebtForm] = useState(false);
            const [showBudgetModal, setShowBudgetModal] = useState(false);
            const [showNetWorthModal, setShowNetWorthModal] = useState(false);
            const [showToolsDropdown, setShowToolsDropdown] = useState(false);
            const [showLinksDropdown, setShowLinksDropdown] = useState(false);
            const [showMonthPicker, setShowMonthPicker] = useState(false);
            const [activeFilter, setActiveFilter] = useState('all');
            const [searchQuery, setSearchQuery] = useState('');
            const [isDarkMode, setIsDarkMode] = useState(false);
            const [showWalletModal, setShowWalletModal] = useState(false);
            const [walletData, setWalletData] = useState({ id: null, name: '', icon: 'User' });
            const [randomFact] = useState(() => SAVING_FACTS[Math.floor(Math.random() * SAVING_FACTS.length)]);
            const [formData, setFormData] = useState({
                id: null,
                description: '',
                amount: '',
                type: 'spending',
                category: 'General',
                date: dayjs().format('YYYY-MM-DD'),
                isRecurring: false,
                isPaid: false,
                datePaid: '',
                walletId: 'personal'
            });
            const [goalData, setGoalData] = useState({ name: '', target: '', current: '' });
            const [assetData, setAssetData] = useState({ 
                id: null, 
                type: 'bank', 
                name: '', 
                value: '', 
                weight: '', 
                pricePerUnit: '',
                symbol: '' 
            });
            const [debtData, setDebtData] = useState({
                id: null,
                name: '',
                balance: '',
                minPayment: '',
                interestRate: '',
                projectedPayoff: ''
            });

            useEffect(() => {
                const handleKeyDown = (e) => {
                    if (e.key === '+' || (e.key === 'n' && (e.ctrlKey || e.metaKey))) {
                        e.preventDefault();
                        setShowForm(true);
                    }
                    if (e.key === 'Escape') {
                        setShowForm(false);
                        setShowGoalForm(false);
                        setShowAssetForm(false);
                        setShowDebtForm(false);
                        setShowBudgetModal(false);
                        setShowNetWorthModal(false);
                    }
                };
                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, []);

            useEffect(() => {
                const timer = setTimeout(() => {
                    setShowSplash(false);
                }, 4500);
                return () => clearTimeout(timer);
            }, []);

            useEffect(() => {
                const savedData = localStorage.getItem(STORAGE_KEY);
                const savedGoals = localStorage.getItem(STORAGE_KEY + '_goals');
                const savedAssets = localStorage.getItem(STORAGE_KEY + '_assets');
                const savedBudgets = localStorage.getItem(STORAGE_KEY + '_budgets');
                const savedWallets = localStorage.getItem(STORAGE_KEY + '_wallets');
                const savedDebts = localStorage.getItem(STORAGE_KEY + '_debts');
                const savedSavingsGoal = localStorage.getItem(STORAGE_KEY + '_monthly_savings_goal');
                const savedDark = localStorage.getItem(STORAGE_KEY + '_dark');
                
                if (savedData) {
                    try { setTransactions(JSON.parse(savedData)); } catch(e) { console.error(e); }
                }
                if (savedGoals) {
                    try { setSavingsGoals(JSON.parse(savedGoals)); } catch(e) { console.error(e); }
                }
                if (savedAssets) {
                    try { setAssets(JSON.parse(savedAssets)); } catch(e) { console.error(e); }
                }
                if (savedBudgets) {
                    try { setBudgets(JSON.parse(savedBudgets)); } catch(e) { console.error(e); }
                }
                if (savedWallets) {
                    try { setWallets(JSON.parse(savedWallets)); } catch(e) { console.error(e); }
                }
                if (savedDebts) {
                    try { setDebts(JSON.parse(savedDebts)); } catch(e) { console.error(e); }
                }
                if (savedSavingsGoal) {
                    setMonthlySavingsGoal(parseFloat(savedSavingsGoal) || 0);
                }
                if (savedDark !== null) {
                    setIsDarkMode(savedDark === 'true');
                } else {
                    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
                    setIsDarkMode(prefersDark);
                }
            }, []);

            useEffect(() => {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(transactions));
                localStorage.setItem(STORAGE_KEY + '_goals', JSON.stringify(savingsGoals));
                localStorage.setItem(STORAGE_KEY + '_assets', JSON.stringify(assets));
                localStorage.setItem(STORAGE_KEY + '_budgets', JSON.stringify(budgets));
                localStorage.setItem(STORAGE_KEY + '_wallets', JSON.stringify(wallets));
                localStorage.setItem(STORAGE_KEY + '_debts', JSON.stringify(debts));
                localStorage.setItem(STORAGE_KEY + '_monthly_savings_goal', monthlySavingsGoal.toString());
                localStorage.setItem(STORAGE_KEY + '_dark', isDarkMode.toString());
                
                if (isDarkMode) {
                    document.body.style.backgroundColor = '#111827';
                } else {
                    document.body.style.backgroundColor = '#f8fafc';
                }
            }, [transactions, savingsGoals, assets, budgets, wallets, debts, monthlySavingsGoal, isDarkMode]);

            const monthlyTransactions = useMemo(() => {
                const start = dayjs(currentMonth).startOf('month');
                const end = dayjs(currentMonth).endOf('month');
                return transactions.filter(t => {
                    const d = dayjs(t.date);
                    const matchesMonth = d.isBetween(start, end, null, '[]');
                    const matchesWallet = t.walletId === activeWalletId || !t.walletId; // Support legacy data
                    
                    // Smart Search Logic
                    const query = searchQuery.toLowerCase().trim();
                    if (!query) return matchesMonth && matchesWallet;

                    // Check for amount filters like ">100" or "<50"
                    if (query.startsWith('>') || query.startsWith('<')) {
                        const operator = query[0];
                        const value = parseFloat(query.slice(1));
                        if (!isNaN(value)) {
                            const matchesAmount = operator === '>' ? t.amount > value : t.amount < value;
                            return matchesMonth && matchesWallet && matchesAmount;
                        }
                    }

                    // Check for category filter like "cat:food"
                    if (query.startsWith('cat:')) {
                        const catQuery = query.slice(4);
                        return matchesMonth && matchesWallet && t.category?.toLowerCase().includes(catQuery);
                    }

                    const matchesSearch = t.description.toLowerCase().includes(query) || 
                                         (t.category && t.category.toLowerCase().includes(query));
                    return matchesMonth && matchesWallet && matchesSearch;
                });
            }, [transactions, currentMonth, searchQuery, activeWalletId]);

            const filteredTransactions = useMemo(() => {
                let filtered = monthlyTransactions;
                if (activeFilter === 'unpaid') return filtered.filter(t => t.type === 'bill' && !t.isPaid);
                if (activeFilter === 'recurring') return filtered.filter(t => t.isRecurring);
                if (activeFilter !== 'all') return filtered.filter(t => t.type === activeFilter);
                return filtered;
            }, [monthlyTransactions, activeFilter]);

            const summary = useMemo(() => {
                const income = monthlyTransactions.filter(t => t.type === 'income').reduce((s, t) => s + t.amount, 0);
                const bills = monthlyTransactions.filter(t => t.type === 'bill').reduce((s, t) => s + t.amount, 0);
                const spending = monthlyTransactions.filter(t => t.type === 'spending').reduce((s, t) => s + t.amount, 0);
                
                const paidBills = monthlyTransactions.filter(t => t.type === 'bill' && t.isPaid).reduce((s, t) => s + t.amount, 0);
                const totalBillsCount = monthlyTransactions.filter(t => t.type === 'bill').length;
                const paidBillsCount = monthlyTransactions.filter(t => t.type === 'bill' && t.isPaid).length;

                const assetTotal = assets.reduce((sum, a) => {
                    if (a.type === 'metal') return sum + (parseFloat(a.weight || 0) * parseFloat(a.pricePerUnit || 0));
                    return sum + parseFloat(a.value || 0);
                }, 0);

                const balance = income - bills - spending;
                const safeToSpend = balance - monthlySavingsGoal;

                return { 
                    income, 
                    bills, 
                    spending, 
                    balance,
                    safeToSpend,
                    paidBills,
                    totalBillsCount,
                    paidBillsCount,
                    assets: assetTotal,
                    netWorth: assetTotal + balance
                };
            }, [monthlyTransactions, assets, monthlySavingsGoal]);

            const averages = useMemo(() => {
                const last3Months = [];
                for (let i = 1; i <= 3; i++) {
                    const m = dayjs().subtract(i, 'month');
                    const start = m.startOf('month');
                    const end = m.endOf('month');
                    const mTrans = transactions.filter(t => dayjs(t.date).isBetween(start, end, null, '[]') && (t.walletId === activeWalletId || !t.walletId));
                    const inc = mTrans.filter(t => t.type === 'income').reduce((s, t) => s + t.amount, 0);
                    const exp = mTrans.filter(t => t.type !== 'income').reduce((s, t) => s + t.amount, 0);
                    last3Months.push({ inc, exp });
                }
                const avgInc = last3Months.reduce((s, m) => s + m.inc, 0) / 3;
                const avgExp = last3Months.reduce((s, m) => s + m.exp, 0) / 3;
                return { avgInc, avgExp };
            }, [transactions, activeWalletId]);

            const categoryBreakdown = useMemo(() => {
                const spending = monthlyTransactions.filter(t => t.type !== 'income');
                const totals = {};
                spending.forEach(t => {
                    const cat = t.category || 'General';
                    totals[cat] = (totals[cat] || 0) + t.amount;
                });
                return Object.entries(totals)
                    .map(([name, amount]) => ({ name, amount }))
                    .sort((a, b) => b.amount - a.amount);
            }, [monthlyTransactions]);

            const budgetStatus = useMemo(() => {
                const totalExpenses = summary.bills + summary.spending;
                if (summary.income === 0) return { label: 'No Income', color: 'text-gray-400', bg: 'bg-gray-100 dark:bg-gray-800', dot: 'bg-gray-400' };
                const ratio = totalExpenses / summary.income;
                if (ratio > 1) return { label: 'Over Budget', color: 'text-rose-600 dark:text-rose-400', bg: 'bg-rose-50 dark:bg-rose-900/20', dot: 'bg-rose-600 dark:bg-rose-400' };
                if (ratio > 0.8) return { label: 'Warning', color: 'text-amber-600 dark:text-amber-400', bg: 'bg-amber-50 dark:bg-amber-900/20', dot: 'bg-amber-600 dark:bg-amber-400' };
                return { label: 'On Track', color: 'text-emerald-600 dark:text-emerald-400', bg: 'bg-emerald-50 dark:bg-emerald-900/20', dot: 'bg-emerald-600 dark:bg-emerald-400' };
            }, [summary]);

            const financialHealth = useMemo(() => {
                const savingsRate = summary.income > 0 ? (summary.balance / summary.income) * 100 : 0;
                const budgetAdherence = Object.keys(budgets).length > 0 ? 
                    Object.keys(budgets).filter(cat => {
                        const spent = categoryBreakdown.find(c => c.name === cat)?.amount || 0;
                        return spent <= budgets[cat];
                    }).length / Object.keys(budgets).length : 1;
                
                let score = 0;
                if (savingsRate > 20) score += 40;
                else if (savingsRate > 10) score += 25;
                else if (savingsRate > 0) score += 10;
                
                score += budgetAdherence * 40;
                if (summary.balance > 0) score += 20;
                
                return {
                    score: Math.min(score, 100),
                    label: score > 80 ? 'Excellent' : score > 60 ? 'Good' : score > 40 ? 'Fair' : 'Needs Work',
                    color: score > 80 ? 'text-emerald-500' : score > 60 ? 'text-blue-500' : score > 40 ? 'text-amber-500' : 'text-rose-500'
                };
            }, [summary, budgets, categoryBreakdown]);

            const comparison = useMemo(() => {
                const prevMonth = dayjs(currentMonth).subtract(1, 'month');
                const start = prevMonth.startOf('month');
                const end = prevMonth.endOf('month');
                const prevTrans = transactions.filter(t => dayjs(t.date).isBetween(start, end, null, '[]'));
                const prevExpenses = prevTrans.filter(t => t.type !== 'income').reduce((s, t) => s + t.amount, 0);
                const currentExpenses = summary.bills + summary.spending;
                
                if (prevExpenses === 0) return null;
                const diff = currentExpenses - prevExpenses;
                const percent = (diff / prevExpenses) * 100;
                return { diff, percent, isUp: diff > 0 };
            }, [transactions, currentMonth, summary]);

            const trendData = useMemo(() => {
                const months = [];
                for (let i = 5; i >= 0; i--) {
                    const m = dayjs().subtract(i, 'month');
                    const start = m.startOf('month');
                    const end = m.endOf('month');
                    const mTrans = transactions.filter(t => dayjs(t.date).isBetween(start, end, null, '[]'));
                    const income = mTrans.filter(t => t.type === 'income').reduce((s, t) => s + t.amount, 0);
                    const expenses = mTrans.filter(t => t.type !== 'income').reduce((s, t) => s + t.amount, 0);
                    months.push({ label: m.format('MMM'), income, expenses });
                }
                return months;
            }, [transactions]);


            const handleAdd = (e) => {
                e.preventDefault();
                if (!formData.description || !formData.amount) return;
                
                if (formData.id) {
                    // Edit existing
                    setTransactions(transactions.map(t => t.id === formData.id ? {
                        ...formData,
                        amount: parseFloat(formData.amount)
                    } : t));
                } else {
                    // Add new
                    const newT = {
                        id: Date.now().toString() + Math.random().toString(36).substr(2, 5),
                        ...formData,
                        amount: parseFloat(formData.amount)
                    };
                    setTransactions([newT, ...transactions]);
                }
                
                setShowForm(false);
                setFormData({ 
                    id: null, 
                    description: '', 
                    amount: '', 
                    type: 'spending', 
                    category: 'General', 
                    date: dayjs().format('YYYY-MM-DD'),
                    isRecurring: false
                });
            };

            const handleEdit = (t) => {
                setFormData({
                    ...t,
                    amount: t.amount.toString()
                });
                setShowForm(true);
            };

            const handleAddGoal = (e) => {
                e.preventDefault();
                if (!goalData.name || !goalData.target) return;
                const newGoal = {
                    id: Date.now().toString(),
                    name: goalData.name,
                    target: parseFloat(goalData.target),
                    current: parseFloat(goalData.current || 0)
                };
                setSavingsGoals([...savingsGoals, newGoal]);
                setShowGoalForm(false);
                setGoalData({ name: '', target: '', current: '' });
            };

            const handleAddAsset = (e) => {
                e.preventDefault();
                if (!assetData.name || (!assetData.value && !assetData.weight)) return;
                
                const newAsset = {
                    ...assetData,
                    id: assetData.id || Date.now().toString(),
                    value: parseFloat(assetData.value || 0),
                    weight: parseFloat(assetData.weight || 0),
                    pricePerUnit: parseFloat(assetData.pricePerUnit || 0)
                };

                if (assetData.id) {
                    setAssets(assets.map(a => a.id === assetData.id ? newAsset : a));
                } else {
                    setAssets([...assets, newAsset]);
                }

                setShowAssetForm(false);
                setAssetData({ id: null, type: 'bank', name: '', value: '', weight: '', pricePerUnit: '', symbol: '' });
            };

            const insights = useMemo(() => {
                const tips = [];
                const savingsRate = summary.income > 0 ? (summary.balance / summary.income) * 100 : 0;
                
                if (savingsRate < 10) tips.push({ text: "Try to save at least 10% of your income. Look for small recurring bills to cut.", icon: "💡" });
                if (summary.spending > summary.bills) tips.push({ text: "Your discretionary spending is higher than your bills. Consider the 50/30/20 rule.", icon: "📊" });
                if (summary.balance < 0) tips.push({ text: "You're spending more than you earn this month. Review your 'Spending' category.", icon: "⚠️" });
                if (assets.length === 0) tips.push({ text: "Start tracking your assets (Bank, Crypto, Metals) to see your full Net Worth.", icon: "🏦" });
                if (savingsGoals.some(g => (g.current / g.target) > 0.9)) tips.push({ text: "You're close to reaching a savings goal! Keep going!", icon: "🎉" });
                
                return tips.length > 0 ? tips : [{ text: "You're doing great! Keep tracking your finances to stay on top of your goals.", icon: "✨" }];
            }, [summary, assets, savingsGoals]);

            const exportData = () => {
                const data = { 
                    transactions, 
                    savingsGoals, 
                    assets, 
                    budgets, 
                    version: '2.1', 
                    exportDate: new Date().toISOString() 
                };
                const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `SpendWise_Backup_${dayjs().format('YYYY-MM-DD')}.json`;
                a.click();
            };

            const importData = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const data = JSON.parse(event.target.result);
                        if (data.transactions || data.assets) {
                            if (confirm("This will merge the imported data with your current data. Continue?")) {
                                if (data.transactions) setTransactions([...data.transactions, ...transactions]);
                                if (data.savingsGoals) setSavingsGoals([...data.savingsGoals, ...savingsGoals]);
                                if (data.assets) setAssets([...data.assets, ...assets]);
                                if (data.budgets) setBudgets({ ...budgets, ...data.budgets });
                                alert("Data imported successfully!");
                            }
                        } else {
                            alert("Invalid backup file format.");
                        }
                    } catch (err) {
                        alert("Error reading file: " + err.message);
                    }
                };
                reader.readAsText(file);
            };

            const exportCSV = () => {
                const headers = ['Date', 'Description', 'Category', 'Type', 'Amount', 'Recurring'];
                const rows = monthlyTransactions.map(t => [
                    t.date,
                    `"${t.description.replace(/"/g, '""')}"`,
                    t.category,
                    t.type,
                    t.amount.toFixed(2),
                    t.isRecurring ? 'Yes' : 'No'
                ]);
                
                const csvContent = [headers, ...rows].map(e => e.join(",")).join("\n");
                const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `SpendWise_Export_${dayjs(currentMonth).format('YYYY_MM')}.csv`;
                a.click();
            };

            const downloadPDF = () => {
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF();
                const monthStr = dayjs(currentMonth).format('MMMM YYYY');
                
                doc.setFontSize(20);
                doc.text(`SpendWise Report: ${monthStr}`, 14, 20);
                
                const summaryData = [
                    ['Income', `$${summary.income.toFixed(2)}`],
                    ['Bills', `$${summary.bills.toFixed(2)}`],
                    ['Spending', `$${summary.spending.toFixed(2)}`],
                    ['Balance', `$${summary.balance.toFixed(2)}`]
                ];

                doc.autoTable({
                    startY: 30,
                    head: [['Category', 'Amount']],
                    body: summaryData,
                    theme: 'striped',
                    headStyles: { fillColor: [16, 185, 129] }
                });

                const transData = monthlyTransactions
                    .sort((a, b) => dayjs(a.date).unix() - dayjs(b.date).unix())
                    .map(t => [
                        dayjs(t.date).format('MMM DD'),
                        t.description,
                        t.type.toUpperCase(),
                        `$${t.amount.toFixed(2)}`
                    ]);

                doc.text(`Transactions`, 14, doc.lastAutoTable.finalY + 15);
                doc.autoTable({
                    startY: doc.lastAutoTable.finalY + 20,
                    head: [['Date', 'Description', 'Type', 'Amount']],
                    body: transData,
                    theme: 'grid'
                });

                doc.save(`SpendWise_${dayjs(currentMonth).format('YYYY_MM')}.pdf`);
            };

            const postRecurringTransactions = () => {
                const recurring = transactions.filter(t => t.isRecurring);
                const newTransactions = [];
                
                recurring.forEach(t => {
                    const alreadyExists = transactions.some(existing => 
                        existing.isRecurring && 
                        existing.name === t.name && 
                        existing.amount === t.amount &&
                        dayjs(existing.date).format('YYYY-MM') === dayjs(currentMonth).format('YYYY-MM')
                    );

                    if (!alreadyExists) {
                        newTransactions.push({
                            ...t,
                            id: Date.now().toString() + Math.random(),
                            date: dayjs(currentMonth).date(dayjs(t.date).date()).toISOString(),
                            isPaid: false,
                            datePaid: null
                        });
                    }
                });

                if (newTransactions.length > 0) {
                    setTransactions([...transactions, ...newTransactions]);
                    alert(`Posted ${newTransactions.length} recurring transactions for ${dayjs(currentMonth).format('MMMM YYYY')}`);
                } else {
                    alert('All recurring transactions are already posted for this month.');
                }
            };

            const copyPrev = () => {
                const prevMonth = dayjs(currentMonth).subtract(1, 'month');
                const start = prevMonth.startOf('month');
                const end = prevMonth.endOf('month');
                const items = transactions.filter(t => {
                    const d = dayjs(t.date);
                    return d.isBetween(start, end, null, '[]') && (t.type === 'income' || t.type === 'bill');
                });
                if (items.length === 0) return alert("No items found in last month.");
                const newItems = items.map(t => ({
                    ...t,
                    id: Date.now() + Math.random(),
                    date: dayjs(currentMonth).startOf('month').format('YYYY-MM-DD')
                }));
                setTransactions([...newItems, ...transactions]);
            };

            if (showSplash) {
                return <SplashScreen />;
            }

            return (
                <div className={`min-h-screen transition-colors duration-500 ${isDarkMode ? 'dark bg-[#0f172a] text-slate-200' : 'bg-[#f8fafc] text-slate-900'}`} style={{ backgroundImage: isDarkMode ? 'radial-gradient(circle at 50% 50%, rgba(15, 23, 42, 1) 0%, rgba(2, 6, 23, 1) 100%)' : 'radial-gradient(circle at 50% 50%, rgba(248, 250, 252, 1) 0%, rgba(241, 245, 249, 1) 100%)' }}>
                    <div className="p-6 md:p-12 max-w-7xl mx-auto space-y-12 fade-in">
                        <header className="flex flex-col md:flex-row justify-between items-center gap-4">
                            <div className="flex items-center gap-3">
                                <div className="p-2 bg-emerald-600 text-white rounded-xl shadow-lg shadow-emerald-100">
                                    <Icons.Wallet />
                                </div>
                                <div>
                                    <h1 className="text-3xl font-light tracking-tight">SpendWise</h1>
                                    <p className="text-[10px] text-gray-400 font-bold uppercase tracking-widest">Personal Finance Tracker</p>
                                </div>
                            </div>
                            <div className="flex items-center gap-4">
                                <div className="relative">
                                    <button 
                                        onClick={() => { setShowLinksDropdown(!showLinksDropdown); setShowToolsDropdown(false); }} 
                                        className="p-2 rounded-xl border transition-all dark:bg-gray-800 dark:border-gray-700 dark:text-gray-300 bg-white border-gray-100 text-gray-400 hover:text-gray-600 flex items-center gap-2 text-sm font-medium"
                                    >
                                        <Icons.ExternalLink />
                                        <span className="hidden md:inline">Links</span>
                                    </button>
                                    {showLinksDropdown && (
                                        <div className="absolute right-0 mt-2 w-64 bg-white dark:bg-gray-800 rounded-2xl shadow-xl border border-gray-100 dark:border-gray-700 z-50 overflow-hidden fade-in">
                                            <div className="p-2 space-y-1 max-h-[70vh] overflow-y-auto">
                                                {[
                                                    { name: 'Learn With Hatty', url: 'https://earnwithhatty.com/' },
                                                    { name: "Hatty's Tools", url: 'https://earn-with-hatty-tools.netlify.app/' },
                                                    { name: "Hatty's Media", url: 'https://hattys-media.netlify.app/' },
                                                    { name: 'Privacy Gadgets', url: 'https://privacy-gadgets-hub.netlify.app/' },
                                                    { name: "Hatty's Universe", url: 'https://hatty-universe.netlify.app/' },
                                                    { name: "Hatty's News", url: 'https://hattys-news.netlify.app/' },
                                                    { name: 'Open Focus', url: 'https://hattyhats.github.io/Open-Focus/' },
                                                    { name: 'OrbitNode', url: 'https://orbit-node.netlify.app/' },
                                                    { name: 'CaseBoard', url: 'https://case-board.netlify.app' },
                                                    { name: 'Token-Tokens', url: 'https://hattyhats.github.io/token-tokens/' }
                                                ].map((link, idx) => (
                                                    <a 
                                                        key={idx} 
                                                        href={link.url} 
                                                        target="_blank" 
                                                        rel="noopener noreferrer"
                                                        className="w-full flex items-center justify-between p-3 hover:bg-emerald-50 dark:hover:bg-emerald-900/20 rounded-xl transition-all text-sm font-medium text-gray-700 dark:text-gray-300 group"
                                                    >
                                                        <span>{link.name}</span>
                                                        <span className="opacity-0 group-hover:opacity-100 transition-opacity text-emerald-600 dark:text-emerald-400">
                                                            <Icons.ExternalLink />
                                                        </span>
                                                    </a>
                                                ))}
                                            </div>
                                        </div>
                                    )}
                                </div>
                                <div className="relative">
                                    <button 
                                        onClick={() => { setShowToolsDropdown(!showToolsDropdown); setShowLinksDropdown(false); }} 
                                        className="p-2 rounded-xl border transition-all dark:bg-gray-800 dark:border-gray-700 dark:text-gray-300 bg-white border-gray-100 text-gray-400 hover:text-gray-600 flex items-center gap-2 text-sm font-medium"
                                    >
                                        <Icons.Settings />
                                        <span className="hidden md:inline">Tools</span>
                                    </button>
                                    {showToolsDropdown && (
                                        <div className="absolute right-0 mt-2 w-56 bg-white dark:bg-gray-800 rounded-2xl shadow-xl border border-gray-100 dark:border-gray-700 z-50 overflow-hidden fade-in">
                                            <div className="p-2 space-y-1">
                                                <button onClick={() => { setShowWalletModal(true); setShowToolsDropdown(false); }} className="w-full flex items-center justify-between p-3 hover:bg-gray-50 dark:hover:bg-gray-700 rounded-xl transition-all text-sm font-medium text-gray-700 dark:text-gray-300">
                                                    <span>Manage Wallets</span>
                                                    <Icons.Wallet />
                                                </button>
                                                <div className="h-px bg-gray-100 dark:bg-gray-700 my-1"></div>
                                                <button onClick={() => { exportData(); setShowToolsDropdown(false); }} className="w-full flex items-center justify-between p-3 hover:bg-gray-50 dark:hover:bg-gray-700 rounded-xl transition-all text-sm font-medium text-gray-700 dark:text-gray-300">
                                                    <span>Export Backup</span>
                                                    <Icons.Download />
                                                </button>
                                                <label className="w-full flex items-center justify-between p-3 hover:bg-gray-50 dark:hover:bg-gray-700 rounded-xl transition-all text-sm font-medium text-gray-700 dark:text-gray-300 cursor-pointer">
                                                    <span>Import Backup</span>
                                                    <Icons.Upload />
                                                    <input type="file" accept=".json" onChange={(e) => { importData(e); setShowToolsDropdown(false); }} className="hidden" />
                                                </label>
                                                <div className="h-px bg-gray-100 dark:bg-gray-700 my-1"></div>
                                                <button onClick={() => {
                                                    if (confirm("Are you sure you want to delete ALL data? This cannot be undone. Export a backup first!")) {
                                                        localStorage.clear();
                                                        window.location.reload();
                                                    }
                                                }} className="w-full flex items-center justify-between p-3 hover:bg-rose-50 dark:hover:bg-rose-900/20 rounded-xl transition-all text-sm font-medium text-rose-600 dark:text-rose-400">
                                                    <span>Reset All Data</span>
                                                    <Icons.Trash />
                                                </button>
                                            </div>
                                        </div>
                                    )}
                                </div>
                                <button onClick={() => setIsDarkMode(!isDarkMode)} className="p-2 rounded-xl border transition-all dark:bg-gray-800 dark:border-gray-700 dark:text-yellow-400 bg-white border-gray-100 text-gray-400 hover:text-gray-600">
                                    {isDarkMode ? '☀️' : '🌙'}
                                </button>
                                <div className={`px-4 py-2 rounded-2xl ${budgetStatus.bg} ${budgetStatus.color} text-xs font-bold uppercase tracking-wider border border-current/10 flex items-center gap-2`}>
                                    <div className={`w-2 h-2 rounded-full ${budgetStatus.dot}`}></div>
                                    {budgetStatus.label}

                                </div>
                            </div>
                        )}

                        {showDebtForm && (
                            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/40 backdrop-blur-sm">
                                <div className="bg-white dark:bg-gray-800 w-full max-w-md rounded-3xl shadow-2xl p-8 space-y-6 fade-in">
                                    <h2 className="text-2xl font-medium tracking-tight">{debtData.id ? 'Edit Debt' : 'New Debt'}</h2>
                                    <form onSubmit={(e) => {
                                        e.preventDefault();
                                        const newDebt = {
                                            ...debtData,
                                            id: debtData.id || Date.now().toString(),
                                            balance: parseFloat(debtData.balance || 0),
                                            minPayment: parseFloat(debtData.minPayment || 0),
                                            interestRate: parseFloat(debtData.interestRate || 0)
                                        };
                                        if (debtData.id) {
                                            setDebts(debts.map(d => d.id === debtData.id ? newDebt : d));
                                        } else {
                                            setDebts([...debts, newDebt]);
                                        }
                                        setShowDebtForm(false);
                                    }} className="space-y-4">
                                        <div className="space-y-1">
                                            <label className="text-[10px] uppercase tracking-widest text-gray-400 font-bold">Debt Name</label>
                                            <input type="text" placeholder="e.g. Credit Card, Student Loan" required className="w-full p-3 bg-gray-50 dark:bg-gray-700 rounded-xl outline-none focus:ring-2 focus:ring-rose-500 dark:text-white" value={debtData.name} onChange={e => setDebtData({...debtData, name: e.target.value})} />
                                        </div>
                                        <div className="grid grid-cols-2 gap-4">
                                            <div className="space-y-1">
                                                <label className="text-[10px] uppercase tracking-widest text-gray-400 font-bold">Current Balance</label>
                                                <input type="number" step="0.01" placeholder="0.00" required className="w-full p-3 bg-gray-50 dark:bg-gray-700 rounded-xl outline-none focus:ring-2 focus:ring-rose-500 dark:text-white" value={debtData.balance} onChange={e => setDebtData({...debtData, balance: e.target.value})} />
                                            </div>
                                            <div className="space-y-1">
                                                <label className="text-[10px] uppercase tracking-widest text-gray-400 font-bold">Interest Rate (%)</label>
                                                <input type="number" step="0.01" placeholder="0.00" className="w-full p-3 bg-gray-50 dark:bg-gray-700 rounded-xl outline-none focus:ring-2 focus:ring-rose-500 dark:text-white" value={debtData.interestRate} onChange={e => setDebtData({...debtData, interestRate: e.target.value})} />
                                            </div>
                                        </div>
                                        <div className="space-y-1">
                                            <label className="text-[10px] uppercase tracking-widest text-gray-400 font-bold">Minimum Payment</label>
                                            <input type="number" step="0.01" placeholder="0.00" className="w-full p-3 bg-gray-50 dark:bg-gray-700 rounded-xl outline-none focus:ring-2 focus:ring-rose-500 dark:text-white" value={debtData.minPayment} onChange={e => setDebtData({...debtData, minPayment: e.target.value})} />
                                        </div>
                                        <div className="flex gap-3 pt-4">
                                            <button type="button" onClick={() => setShowDebtForm(false)} className="flex-1 p-3 text-gray-500 hover:bg-gray-50 dark:hover:bg-gray-700 rounded-xl font-medium">Cancel</button>
                                            <button type="submit" className="flex-1 p-3 bg-rose-600 text-white rounded-xl shadow-lg hover:bg-rose-700 font-semibold">{debtData.id ? 'Update' : 'Add Debt'}</button>
                                        </div>
                                    </form>
                                </div>
                            </div>
                        )}

                        {showGoalForm && (
                            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/40 backdrop-blur-sm">
                                <div className="bg-white dark:bg-gray-800 w-full max-w-md rounded-3xl shadow-2xl p-8 space-y-6 fade-in">
                                    <h2 className="text-2xl font-medium tracking-tight">New Savings Goal</h2>
                                    <form onSubmit={handleAddGoal} className="space-y-4">
                                        <div className="space-y-1">
                                            <label className="text-[10px] uppercase tracking-widest text-gray-400 font-bold">Goal Name</label>
                                            <input type="text" placeholder="e.g. New Car, Emergency Fund" required className="w-full p-3 bg-gray-50 dark:bg-gray-700 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 dark:text-white" value={goalData.name} onChange={e => setGoalData({...goalData, name: e.target.value})} />
                                        </div>
                                        <div className="grid grid-cols-2 gap-4">
                                            <div className="space-y-1">
                                                <label className="text-[10px] uppercase tracking-widest text-gray-400 font-bold">Target Amount</label>
                                                <input type="number" step="0.01" placeholder="0.00" required className="w-full p-3 bg-gray-50 dark:bg-gray-700 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 dark:text-white" value={goalData.target} onChange={e => setGoalData({...goalData, target: e.target.value})} />
                                            </div>
                                            <div className="space-y-1">
                                                <label className="text-[10px] uppercase tracking-widest text-gray-400 font-bold">Current Savings</label>
                                                <input type="number" step="0.01" placeholder="0.00" className="w-full p-3 bg-gray-50 dark:bg-gray-700 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 dark:text-white" value={goalData.current} onChange={e => setGoalData({...goalData, current: e.target.value})} />
                                            </div>
                                        </div>
                                        <div className="flex gap-3 pt-4">
                                            <button type="button" onClick={() => setShowGoalForm(false)} className="flex-1 p-3 text-gray-500 hover:bg-gray-50 dark:hover:bg-gray-700 rounded-xl font-medium">Cancel</button>
                                            <button type="submit" className="flex-1 p-3 bg-blue-600 text-white rounded-xl shadow-lg hover:bg-blue-700 font-semibold">Create Goal</button>
                                        </div>
                                    </form>
                                </div>
                            </div>
                        )}

                        {showBudgetModal && (
                            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/40 backdrop-blur-sm">
                                <div className="bg-white dark:bg-gray-800 w-full max-w-md rounded-3xl shadow-2xl p-8 space-y-6 fade-in">
                                    <div className="flex justify-between items-center">
                                        <h2 className="text-2xl font-medium tracking-tight">Category Budgets</h2>
                                        <button onClick={() => setShowBudgetModal(false)} className="text-gray-400 hover:text-gray-600"><Icons.Plus /></button>
                                    </div>
                                    <div className="space-y-4 max-h-[400px] overflow-y-auto pr-2 no-scrollbar">
                                        {Object.keys(CATEGORIES).map(cat => (
                                            <div key={cat} className="space-y-1">
                                                <label className="text-[10px] uppercase tracking-widest text-gray-400 font-bold flex items-center gap-2">
                                                    <span>{CATEGORIES[cat].icon}</span> {cat}
                                                </label>
                                                <input 
                                                    type="number" 
                                                    placeholder="Set monthly budget" 
                                                    className="w-full p-3 bg-gray-50 dark:bg-gray-700 rounded-xl outline-none focus:ring-2 focus:ring-emerald-500 dark:text-white" 
                                                    value={budgets[cat] || ''} 
                                                    onChange={e => setBudgets({...budgets, [cat]: parseFloat(e.target.value) || 0})} 
                                                />
                                            </div>
                                        ))}
                                    </div>
                                    <button onClick={() => setShowBudgetModal(false)} className="w-full p-3 bg-emerald-600 text-white rounded-xl shadow-lg hover:bg-emerald-700 font-semibold">Save Budgets</button>
                                </div>
                            </div>
                        )}

                        {showNetWorthModal && (
                            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/40 backdrop-blur-sm">
                                <div className="bg-white dark:bg-gray-800 w-full max-w-lg rounded-3xl shadow-2xl p-8 space-y-6 fade-in">
                                    <div className="flex justify-between items-center">
                                        <h2 className="text-2xl font-medium tracking-tight">Net Worth Breakdown</h2>
                                        <button onClick={() => setShowNetWorthModal(false)} className="text-gray-400 hover:text-gray-600"><Icons.Plus /></button>
                                    </div>
                                    
                                    <div className="grid grid-cols-2 gap-4">
                                        <div className="p-4 bg-emerald-50 dark:bg-emerald-900/20 rounded-2xl border border-emerald-100 dark:border-emerald-800">
                                            <p className="text-[10px] text-emerald-600 dark:text-emerald-400 font-bold uppercase tracking-widest">Total Assets</p>
                                            <p className="text-2xl font-mono font-bold text-emerald-700 dark:text-emerald-300">${summary.assets.toFixed(2)}</p>
                                        </div>
                                        <div className="p-4 bg-blue-50 dark:bg-blue-900/20 rounded-2xl border border-blue-100 dark:border-blue-800">
                                            <p className="text-[10px] text-blue-600 dark:text-blue-400 font-bold uppercase tracking-widest">Monthly Surplus</p>
                                            <p className="text-2xl font-mono font-bold text-blue-700 dark:text-blue-300">${summary.balance.toFixed(2)}</p>
                                        </div>
                                    </div>

                                    <div className="space-y-4">
                                        <h3 className="text-xs font-bold text-gray-400 uppercase tracking-widest">Asset Allocation</h3>
                                        <div className="space-y-3">
                                            {assets.map(a => {
                                                const val = a.type === 'metal' ? a.weight * a.pricePerUnit : a.value;
                                                const pct = summary.assets > 0 ? (val / summary.assets) * 100 : 0;
                                                return (
                                                    <div key={a.id} className="space-y-1">
                                                        <div className="flex justify-between text-sm">
                                                            <span className="text-gray-600 dark:text-gray-400">{a.name}</span>
                                                            <span className="font-mono font-bold">${val.toFixed(2)} ({pct.toFixed(1)}%)</span>
                                                        </div>
                                                        <div className="w-full bg-gray-100 dark:bg-gray-700 h-1.5 rounded-full overflow-hidden">
                                                            <div className="h-full bg-indigo-500" style={{ width: `${pct}%` }}></div>
                                                        </div>
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    </div>

                                    <div className="pt-4 border-t border-gray-100 dark:border-gray-700">
                                        <div className="flex justify-between items-center">
                                            <span className="text-lg font-medium">Total Net Worth</span>
                                            <span className="text-2xl font-mono font-bold text-emerald-600">${summary.netWorth.toFixed(2)}</span>
                                        </div>
                                    </div>
                                    
                                    <button onClick={() => setShowNetWorthModal(false)} className="w-full p-3 bg-gray-100 dark:bg-gray-700 text-gray-700 dark:text-gray-300 rounded-xl font-semibold hover:bg-gray-200 dark:hover:bg-gray-600">Close</button>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }


        function SummaryCard({ title, amount, color, icon, highlight, onAdd, onClick, active, isSetting }) {
            return (
                <div 
                    onClick={onClick}
                    className={`bg-white dark:bg-gray-800 border-gray-100 dark:border-gray-700 p-6 rounded-[2rem] shadow-sm border flex flex-col justify-between h-40 relative group transition-all duration-300 ${onClick ? 'cursor-pointer' : ''} ${highlight ? 'bg-gradient-to-br from-white to-gray-50 dark:from-gray-800 dark:to-gray-900 border-gray-200 dark:border-gray-600' : ''} ${active ? 'ring-2 ring-emerald-500 shadow-md transform scale-[1.02]' : 'hover:shadow-md hover:scale-[1.01]'}`}
                >
                    <div className="flex justify-between items-start">
                        <span className="text-[10px] font-bold uppercase tracking-widest text-gray-400">{title}</span>
                        <div className={`p-2.5 rounded-2xl transition-colors ${active ? 'bg-emerald-500 text-white' : 'bg-gray-50 dark:bg-gray-700 text-gray-400 dark:text-gray-500'}`}>
                            {isSetting ? <Icons.Settings /> : icon}
                        </div>
                    </div>
                    <div className="flex justify-between items-end">
                        <p className={`text-3xl font-mono font-bold tracking-tighter ${color}`}>${amount.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}</p>
                        {onAdd && (
                            <button 
                                onClick={(e) => { e.stopPropagation(); onAdd(); }} 
                                className="p-2 rounded-xl transition-all opacity-0 group-hover:opacity-100 bg-gray-50 dark:bg-gray-700 text-gray-400 dark:text-gray-500 hover:text-emerald-600 dark:hover:text-emerald-400 hover:bg-emerald-50 dark:hover:bg-emerald-900/30"
                            >
                                <Icons.Plus />
                            </button>
                        )}
                    </div>
                </div>
            );
        }

        function SplashScreen() {
            return (
                <div className="fixed inset-0 z-[100] bg-slate-50 dark:bg-gray-900 flex flex-col items-center justify-center overflow-hidden">
                    {/* Floating Money Sign */}
                    <div className="absolute text-[30rem] md:text-[50rem] font-bold text-emerald-500/5 select-none pointer-events-none animate-float">
                        $
                    </div>
                    
                    <div className="relative z-10 text-center space-y-6 px-4">
                        <h2 className="text-3xl md:text-5xl font-light text-gray-400 animate-fade-in-up">Welcome To:</h2>
                        <h1 className="text-6xl md:text-9xl font-bold text-emerald-600 animate-fade-in-up [animation-delay:0.5s] tracking-tighter">SpendWise</h1>
                        <p className="text-lg md:text-2xl text-gray-500 animate-fade-in-up [animation-delay:1.2s]">
                            Created by <span className="glitch-text font-bold text-gray-800 dark:text-gray-200" data-text="HattyHats">HattyHats</span>
                        </p>
                        
                        {/* Loading Sign */}
                        <div className="pt-16 animate-fade-in [animation-delay:2.2s] flex flex-col items-center gap-4">
                            <div className="relative w-16 h-16">
                                <div className="absolute inset-0 border-4 border-emerald-100 dark:border-emerald-900/30 rounded-full"></div>
                                <div className="absolute inset-0 border-4 border-emerald-600 border-t-transparent rounded-full animate-spin"></div>
                            </div>
                            <p className="text-[10px] font-bold uppercase tracking-[0.3em] text-emerald-600/60">Initializing System</p>
                        </div>
                    </div>
                </div>
            );
        }


        function ProgressBar({ label, value, max, color }) {
            const percentage = max > 0 ? Math.min((value / max) * 100, 100) : 0;
            return (
                <div className="space-y-2.5">
                    <div className="flex justify-between items-end">
                        <span className="text-[10px] font-bold uppercase tracking-[0.15em] text-gray-400">{label}</span>
                        <span className={`text-xs font-mono font-bold ${color.replace('bg-', 'text-')}`}>${value.toLocaleString(undefined, {minimumFractionDigits: 0, maximumFractionDigits: 0})}</span>
                    </div>
                    <div className="w-full bg-gray-100 dark:bg-gray-700/50 h-2 rounded-full overflow-hidden shadow-inner">
                        <div className={`h-full ${color} transition-all duration-1000 ease-out shadow-sm`} style={{ width: `${percentage}%` }}></div>
                    </div>
                </div>
            );
        }

        try {
            const root = ReactDOM.createRoot(document.getElementById('root'));
            root.render(<App />);
        } catch (err) {
            console.error("Render Error:", err);
            document.getElementById('error-display').style.display = 'block';
            document.getElementById('error-display').innerHTML = `<strong>Render Error:</strong>\n${err.message}`;
        }
    </script>

</body>
</html>
