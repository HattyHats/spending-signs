                                                    <button onClick={() => { if (window.confirm('Delete asset?')) setAssets(as => as.filter(x => x.id !== a.id)); }} style={{ background: 'none', border: 'none', cursor: 'pointer', color: '#484f58', display: 'flex', padding: 3 }} onMouseEnter={e => e.currentTarget.style.color = '#f85149'} onMouseLeave={e => e.currentTarget.style.color = '#484f58'}><I.Trash /></button>
                                                </div>
                                            </div>
                                        );
                                    }) : <p style={{ fontSize: 12, color: '#484f58', fontStyle: 'italic', margin: 0 }}>Track bank accounts, crypto, precious metals.</p>}
                                </div>

                                {/* Debts */}
                                <div className="card fade-up" style={{ padding: 20 }}>
                                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 16 }}>
                                        <p style={{ margin: 0, fontSize: 10, fontWeight: 700, letterSpacing: '0.1em', textTransform: 'uppercase', color: '#484f58' }}>Debts & Loans</p>
                                        <button onClick={() => { setEditDebt(null); setModal('debt'); }} style={{ background: 'none', border: 'none', cursor: 'pointer', color: '#484f58', display: 'flex', borderRadius: 6, padding: 4 }} onMouseEnter={e => e.currentTarget.style.color = '#22c55e'} onMouseLeave={e => e.currentTarget.style.color = '#484f58'}><I.Plus /></button>
                                    </div>
                                    {debts.length > 0 ? debts.map(d => (
                                        <div key={d.id} style={{ background: dark ? '#21262d' : '#f6f8fa', border: `1px solid ${cardBorder}`, borderRadius: 10, padding: '12px 14px', marginBottom: 10 }}>
                                            <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 4 }}>
                                                <span style={{ fontWeight: 700, fontSize: 13, color: textPrimary }}>{d.name}</span>
                                                <span className="mono" style={{ fontSize: 14, fontWeight: 700, color: '#f85149' }}>${parseFloat(d.balance).toFixed(2)}</span>
                                            </div>
                                            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                                                <span style={{ fontSize: 10, color: '#484f58', fontWeight: 700, textTransform: 'uppercase' }}>{d.interestRate}% APR · Min ${ d.minPayment}</span>
                                                <div style={{ display: 'flex', gap: 8 }}>
                                                    <button style={{ fontSize: 10, fontWeight: 700, color: '#58a6ff', background: 'none', border: 'none', cursor: 'pointer', padding: 0 }} onClick={() => { setEditDebt(d); setModal('debt'); }}>Edit</button>
                                                    <button style={{ fontSize: 10, fontWeight: 700, color: '#f85149', background: 'none', border: 'none', cursor: 'pointer', padding: 0 }} onClick={() => { if (window.confirm('Delete debt?')) setDebts(ds => ds.filter(x => x.id !== d.id)); }}>Delete</button>
                                                </div>
                                            </div>
                                        </div>
                                    )) : <p style={{ fontSize: 12, color: '#484f58', fontStyle: 'italic', margin: 0 }}>No debts tracked.</p>}
                                </div>

                                {/* Insights */}
                                <div className="card fade-up" style={{ padding: 20 }}>
                                    <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 14 }}>
                                        <I.Bulb />
                                        <p style={{ margin: 0, fontSize: 10, fontWeight: 700, letterSpacing: '0.1em', textTransform: 'uppercase', color: '#484f58' }}>Financial Tip</p>
                                    </div>
                                    <div style={{ background: '#22c55e0e', border: '1px solid #22c55e20', borderRadius: 10, padding: 14 }}>
                                        <p style={{ margin: 0, fontSize: 13, color: '#22c55e', lineHeight: 1.6, fontStyle: 'italic' }}>"{randomFact}"</p>
                                    </div>
                                    {summary.balance < 0 && <div style={{ marginTop: 10, background: '#ef444410', border: '1px solid #ef444420', borderRadius: 10, padding: 12, display: 'flex', gap: 8, alignItems: 'flex-start' }}>
                                        <I.Alert /><p style={{ margin: 0, fontSize: 12, color: '#f85149', lineHeight: 1.5 }}>You're spending more than you earn this month. Review your expenses.</p>
                                    </div>}
                                    {summary.income > 0 && summary.balance / summary.income < 0.1 && summary.balance >= 0 && <div style={{ marginTop: 10, background: '#f59e0b10', border: '1px solid #f59e0b20', borderRadius: 10, padding: 12, display: 'flex', gap: 8, alignItems: 'flex-start' }}>
                                        <I.Alert /><p style={{ margin: 0, fontSize: 12, color: '#f59e0b', lineHeight: 1.5 }}>You're saving less than 10% of income. Try to increase your savings rate.</p>
                                    </div>}
                                </div>
                            </div>

                            {/* ── Main Content ──────────────────────────────────────────── */}
                            <div style={{ display: 'flex', flexDirection: 'column', gap: 20, minWidth: 0 }}>

                                {/* Charts row */}
                                <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 16 }}>
                                    <div className="card fade-up" style={{ padding: 20 }}>
                                        <p style={{ margin: '0 0 16px', fontSize: 11, fontWeight: 700, letterSpacing: '0.1em', textTransform: 'uppercase', color: '#484f58' }}>Spending by Category</p>
                                        {catBreakdown.length > 0 ? (
                                            <div style={{ height: 220 }}>
                                                <ResponsiveContainer width="100%" height="100%">
                                                    <BarChart data={catBreakdown} margin={{ top: 0, right: 0, left: -20, bottom: 0 }}>
                                                        <CartesianGrid strokeDasharray="3 3" vertical={false} stroke={dark ? '#21262d' : '#e0e0e0'} />
                                                        <XAxis dataKey="name" axisLine={false} tickLine={false} tick={{ fontSize: 9, fill: '#484f58', fontWeight: 700 }} />
                                                        <YAxis axisLine={false} tickLine={false} tick={{ fontSize: 9, fill: '#484f58' }} />
                                                        <Tooltip contentStyle={{ background: dark ? '#161b22' : '#fff', border: `1px solid ${cardBorder}`, borderRadius: 10, fontSize: 12 }} />
                                                        <Bar dataKey="amount" radius={[4, 4, 0, 0]}>
                                                            {catBreakdown.map((e, i) => <Cell key={i} fill={getCatColor(e.name)} />)}
                                                        </Bar>
                                                    </BarChart>
                                                </ResponsiveContainer>
                                            </div>
                                        ) : <div style={{ height: 220, display: 'flex', alignItems: 'center', justifyContent: 'center', color: '#484f58', fontSize: 13 }}>No spending data this month</div>}
                                    </div>

                                    <div className="card fade-up" style={{ padding: 20 }}>
                                        <p style={{ margin: '0 0 16px', fontSize: 11, fontWeight: 700, letterSpacing: '0.1em', textTransform: 'uppercase', color: '#484f58' }}>6-Month Trend</p>
                                        <div style={{ height: 220 }}>
                                            <ResponsiveContainer width="100%" height="100%">
                                                <LineChart data={trendData} margin={{ top: 0, right: 0, left: -20, bottom: 0 }}>
                                                    <CartesianGrid strokeDasharray="3 3" vertical={false} stroke={dark ? '#21262d' : '#e0e0e0'} />
                                                    <XAxis dataKey="label" axisLine={false} tickLine={false} tick={{ fontSize: 9, fill: '#484f58', fontWeight: 700 }} />
                                                    <YAxis axisLine={false} tickLine={false} tick={{ fontSize: 9, fill: '#484f58' }} />
                                                    <Tooltip contentStyle={{ background: dark ? '#161b22' : '#fff', border: `1px solid ${cardBorder}`, borderRadius: 10, fontSize: 12 }} />
                                                    <Legend wrapperStyle={{ fontSize: 10, fontWeight: 700, textTransform: 'uppercase' }} />
                                                    <Line type="monotone" dataKey="income" stroke="#22c55e" strokeWidth={2.5} dot={{ r: 3, fill: '#22c55e' }} activeDot={{ r: 5 }} />
                                                    <Line type="monotone" dataKey="expenses" stroke="#ef4444" strokeWidth={2.5} dot={{ r: 3, fill: '#ef4444' }} activeDot={{ r: 5 }} />
                                                </LineChart>
                                            </ResponsiveContainer>
                                        </div>
                                    </div>
                                </div>

                                {/* Budget Health */}
                                <div className="card fade-up" style={{ padding: 20 }}>
                                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 20 }}>
                                        <p style={{ margin: 0, fontSize: 11, fontWeight: 700, letterSpacing: '0.1em', textTransform: 'uppercase', color: '#484f58' }}>Budget Health</p>
                                        <span className="tag mono" style={{ background: `${healthScore.color}18`, color: healthScore.color }}>Score: {healthScore.score}/100 · {healthScore.label}</span>
                                    </div>
                                    <div style={{ display: 'grid', gridTemplateColumns: 'auto 1fr', gap: 32, alignItems: 'center' }}>
                                        <div style={{ position: 'relative', width: 100, height: 100, flexShrink: 0 }}>
                                            <svg width="100" height="100" style={{ transform: 'rotate(-90deg)' }}>
                                                <circle cx="50" cy="50" r="42" stroke={dark ? '#21262d' : '#e0e0e0'} strokeWidth="8" fill="transparent" />
                                                <circle cx="50" cy="50" r="42" stroke={healthScore.color} strokeWidth="8" fill="transparent"
                                                    strokeDasharray={263.9} strokeDashoffset={263.9 - (263.9 * healthScore.score / 100)}
                                                    strokeLinecap="round" style={{ transition: 'stroke-dashoffset 1s ease' }} />
                                            </svg>
                                            <div style={{ position: 'absolute', inset: 0, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center' }}>
                                                <span className="mono" style={{ fontSize: 22, fontWeight: 700, color: healthScore.color }}>{healthScore.score}</span>
                                                <span style={{ fontSize: 8, fontWeight: 800, textTransform: 'uppercase', letterSpacing: '0.08em', color: '#484f58' }}>{healthScore.label}</span>
                                            </div>
                                        </div>
                                        <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
                                            <ProgressBar label="Income Used" value={summary.bills + summary.spending} max={summary.income || 1} color={summary.bills + summary.spending > summary.income ? '#ef4444' : '#22c55e'} />
                                            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12 }}>
                                                <div style={{ background: dark ? '#21262d' : '#f6f8fa', borderRadius: 10, padding: '10px 14px' }}>
                                                    <p style={{ margin: 0, fontSize: 10, fontWeight: 700, color: '#484f58', textTransform: 'uppercase', letterSpacing: '0.08em' }}>Savings Rate</p>
                                                    <p className="mono" style={{ margin: '4px 0 0', fontSize: 20, fontWeight: 700, color: '#3b82f6' }}>{summary.income > 0 ? Math.max(0, (summary.balance / summary.income * 100)).toFixed(1) : 0}%</p>
                                                </div>
                                                <div style={{ background: dark ? '#21262d' : '#f6f8fa', borderRadius: 10, padding: '10px 14px' }}>
                                                    <p style={{ margin: 0, fontSize: 10, fontWeight: 700, color: '#484f58', textTransform: 'uppercase', letterSpacing: '0.08em' }}>Daily Budget</p>
                                                    <p className="mono" style={{ margin: '4px 0 0', fontSize: 20, fontWeight: 700, color: textPrimary }}>${(Math.max(0, summary.balance) / 30).toFixed(2)}</p>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                {/* Transaction List */}
                                <div className="card fade-up" style={{ overflow: 'hidden' }}>
                                    <div style={{ padding: '18px 20px', borderBottom: `1px solid ${cardBorder}`, display: 'flex', justifyContent: 'space-between', alignItems: 'center', flexWrap: 'wrap', gap: 12 }}>
                                        <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
                                            <h2 style={{ margin: 0, fontSize: 17, fontWeight: 700, color: textPrimary }}>Transactions</h2>
                                            <div className="nav-pill">
                                                {['all', 'income', 'bill', 'spending', 'unpaid', 'recurring'].map(f => (
                                                    <button key={f} onClick={() => setFilter(f)} className={filter === f ? 'active' : ''}>{f}</button>
                                                ))}
                                            </div>
                                        </div>
                                        <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                                            <input
                                                style={{ padding: '7px 12px', background: dark ? '#0d1117' : '#f6f8fa', border: `1px solid ${cardBorder}`, borderRadius: 9, color: textPrimary, fontSize: 13, width: 220, outline: 'none', fontFamily: 'DM Sans, sans-serif' }}
                                                placeholder="Search… or >100, cat:food"
                                                value={search}
                                                onChange={e => setSearch(e.target.value)}
                                            />
                                            <span style={{ fontSize: 11, fontWeight: 700, color: '#484f58', textTransform: 'uppercase', letterSpacing: '0.08em', whiteSpace: 'nowrap' }}>{sortedTxs.length} items</span>
                                        </div>
                                    </div>

                                    <div style={{ maxHeight: 700, overflowY: 'auto' }}>
                                        {sortedTxs.length > 0 ? sortedTxs.map(t => {
                                            const isIncome = t.type === 'income';
                                            const isBill = t.type === 'bill';
                                            const overdue = isBill && !t.isPaid && dayjs().isAfter(dayjs(t.date));
                                            return (
                                                <div key={t.id} className="tx-row" style={{ background: 'transparent' }}>
                                                    <div style={{ display: 'flex', alignItems: 'center', gap: 14, minWidth: 0 }}>
                                                        <div style={{ width: 42, height: 42, borderRadius: 12, flexShrink: 0, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 18, background: isIncome ? '#22c55e10' : isBill ? (t.isPaid ? '#22c55e10' : '#f59e0b10') : '#ef444410' }}>
                                                            {isIncome ? '💰' : getCatIcon(t.category)}
                                                        </div>
                                                        <div style={{ minWidth: 0 }}>
                                                            <div style={{ display: 'flex', alignItems: 'center', gap: 6, flexWrap: 'wrap' }}>
                                                                <span style={{ fontWeight: 700, fontSize: 14, color: textPrimary, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis', maxWidth: 260 }}>{t.description}</span>
                                                                {t.isRecurring && <span className="tag" style={{ background: '#3b82f610', color: '#60a5fa' }}><I.Repeat /> Auto</span>}
                                                                {isBill && (
                                                                    <button onClick={() => togglePaid(t.id)} className="tag" style={{ background: t.isPaid ? '#22c55e18' : '#f85149'+'18', color: t.isPaid ? '#22c55e' : '#f85149', border: 'none', cursor: 'pointer', fontFamily: 'DM Sans, sans-serif' }}>
                                                                        {t.isPaid ? '✓ Paid' : 'Unpaid'}
                                                                    </button>
                                                                )}
                                                                {overdue && <span className="tag" style={{ background: '#f8514918', color: '#f85149' }}>Overdue</span>}
                                                            </div>
                                                            <div style={{ display: 'flex', gap: 8, marginTop: 3 }}>
                                                                <span style={{ fontSize: 10, fontWeight: 700, letterSpacing: '0.06em', textTransform: 'uppercase', color: '#484f58', background: dark ? '#21262d' : '#f0f0f0', padding: '1px 6px', borderRadius: 5 }}>{t.category}</span>
                                                                <span style={{ fontSize: 10, color: '#484f58', fontWeight: 600 }}>{dayjs(t.date).format('MMM D, YYYY')}</span>
                                                                {t.isPaid && t.datePaid && <span style={{ fontSize: 10, color: '#22c55e', fontWeight: 600 }}>Paid {dayjs(t.datePaid).format('MMM D')}</span>}
                                                            </div>
                                                        </div>
                                                    </div>
                                                    <div style={{ display: 'flex', alignItems: 'center', gap: 8, flexShrink: 0 }}>
                                                        <span className="mono" style={{ fontSize: 17, fontWeight: 700, color: isIncome ? '#22c55e' : textPrimary }}>
                                                            {isIncome ? '+' : '-'}${fmt(t.amount)}
                                                        </span>
                                                        <button onClick={() => openEditTx(t)} style={{ width: 30, height: 30, display: 'flex', alignItems: 'center', justifyContent: 'center', background: 'none', border: 'none', cursor: 'pointer', color: '#484f58', borderRadius: 8, transition: 'all 0.15s' }} title="Edit" onMouseEnter={e => { e.currentTarget.style.background = dark ? '#21262d' : '#f0f0f0'; e.currentTarget.style.color = '#58a6ff'; }} onMouseLeave={e => { e.currentTarget.style.background = 'none'; e.currentTarget.style.color = '#484f58'; }}><I.Edit /></button>
                                                        {/* FIX: Pass t.id explicitly to avoid closure issues */}
                                                        <button onClick={() => deleteTx(t.id)} style={{ width: 30, height: 30, display: 'flex', alignItems: 'center', justifyContent: 'center', background: 'none', border: 'none', cursor: 'pointer', color: '#484f58', borderRadius: 8, transition: 'all 0.15s' }} title="Delete" onMouseEnter={e => { e.currentTarget.style.background = '#f8514918'; e.currentTarget.style.color = '#f85149'; }} onMouseLeave={e => { e.currentTarget.style.background = 'none'; e.currentTarget.style.color = '#484f58'; }}><I.Trash /></button>
                                                    </div>
                                                </div>
                                            );
                                        }) : (
                                            <div style={{ padding: '60px 20px', textAlign: 'center', color: '#484f58' }}>
                                                <p style={{ fontSize: 14, margin: 0 }}>No {filter !== 'all' ? filter : ''} transactions found.</p>
                                                <p style={{ fontSize: 12, margin: '8px 0 0' }}>Add one with the button above, or clear your filters.</p>
                                            </div>
                                        )}
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* ─── Modals ─────────────────────────────────────────────────────── */}

                    {modal === 'tx' && (
                        <Modal title={editTx?.id ? 'Edit Transaction' : 'New Transaction'} onClose={() => setModal(null)}>
                            <TransactionForm initial={editTx} wallets={wallets} onSave={saveTx} onClose={() => setModal(null)} />
                        </Modal>
                    )}

                    {modal === 'goal' && (
                        <Modal title="New Savings Goal" onClose={() => setModal(null)}>
                            <GoalForm onSave={(g) => { setSavingsGoals(gs => [...gs, { ...g, id: genId() }]); setModal(null); }} onClose={() => setModal(null)} />
                        </Modal>
                    )}

                    {modal === 'asset' && (
                        <Modal title={editAsset ? 'Edit Asset' : 'New Asset'} onClose={() => setModal(null)}>
                            <AssetForm initial={editAsset} onSave={(a) => { setAssets(as => a.id ? as.map(x => x.id === a.id ? a : x) : [...as, { ...a, id: genId() }]); setModal(null); }} onClose={() => setModal(null)} />
                        </Modal>
                    )}

                    {modal === 'debt' && (
                        <Modal title={editDebt ? 'Edit Debt' : 'New Debt'} onClose={() => setModal(null)}>
                            <DebtForm initial={editDebt} onSave={(d) => { setDebts(ds => d.id ? ds.map(x => x.id === d.id ? d : x) : [...ds, { ...d, id: genId() }]); setModal(null); }} onClose={() => setModal(null)} />
                        </Modal>
                    )}

                    {modal === 'budget' && (
                        <Modal title="Category Budgets" onClose={() => setModal(null)}>
                            <BudgetModal budgets={budgets} onChange={setBudgets} onClose={() => setModal(null)} dark={dark} />
                        </Modal>
                    )}

                    {modal === 'networth' && (
                        <Modal title="Net Worth Breakdown" onClose={() => setModal(null)} maxWidth={520}>
                            <NetWorthModal summary={summary} assets={assets} dark={dark} onClose={() => setModal(null)} />
                        </Modal>
                    )}

                    {modal === 'wallet' && (
                        <Modal title="Manage Wallets" onClose={() => setModal(null)}>
                            <WalletModal wallets={wallets} onUpdate={setWallets} activeWalletId={activeWalletId} onSetActive={setActiveWalletId} onClose={() => setModal(null)} dark={dark} />
                        </Modal>
                    )}

                    {modal === 'monthpicker' && (
                        <Modal title="Select Month" onClose={() => setModal(null)} maxWidth={340}>
                            <MonthPicker current={currentMonth} onChange={(m) => { setCurrentMonth(m); setModal(null); }} dark={dark} />
                        </Modal>
                    )}
                </div>
            );
        }

        // ─── Sub-components ───────────────────────────────────────────────────────────
        function GoalForm({ onSave, onClose }) {
            const [form, setForm] = useState({ name: '', target: '', current: '' });
            return (
                <form onSubmit={e => { e.preventDefault(); if (!form.name || !form.target) return; onSave({ name: form.name, target: parseFloat(form.target), current: parseFloat(form.current || 0) }); }}>
                    <div style={{ marginBottom: 16 }}><Label>Goal Name</Label><input className="input-field" required placeholder="e.g. Emergency Fund, New Car" value={form.name} onChange={e => setForm(f => ({ ...f, name: e.target.value }))} /></div>
                    <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12, marginBottom: 24 }}>
                        <div><Label>Target Amount ($)</Label><input className="input-field" type="number" step="0.01" min="0" required placeholder="5000" value={form.target} onChange={e => setForm(f => ({ ...f, target: e.target.value }))} /></div>
                        <div><Label>Already Saved ($)</Label><input className="input-field" type="number" step="0.01" min="0" placeholder="0" value={form.current} onChange={e => setForm(f => ({ ...f, current: e.target.value }))} /></div>
                    </div>
                    <div style={{ display: 'flex', gap: 10 }}><Btn variant="outline" full onClick={onClose}>Cancel</Btn><Btn variant="primary" type="submit" full>Create Goal</Btn></div>
                </form>
            );
        }

        function AssetForm({ initial, onSave, onClose }) {
            const [form, setForm] = useState({ id: null, type: 'bank', name: '', value: '', weight: '', pricePerUnit: '', symbol: '', ...initial });
            return (
                <form onSubmit={e => { e.preventDefault(); onSave({ ...form, value: parseFloat(form.value || 0), weight: parseFloat(form.weight || 0), pricePerUnit: parseFloat(form.pricePerUnit || 0) }); }}>
                    <div style={{ marginBottom: 16 }}>
                        <Label>Asset Type</Label>
                        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 8 }}>
                            {[{ id: 'bank', label: 'Bank', icon: '🏦' }, { id: 'crypto', label: 'Crypto', icon: '🪙' }, { id: 'metal', label: 'Metal', icon: '💎' }].map(t => (
                                <button key={t.id} type="button" onClick={() => setForm(f => ({ ...f, type: t.id }))} style={{ padding: '10px 0', border: '2px solid', borderColor: form.type === t.id ? '#a855f7' : '#30363d', background: form.type === t.id ? '#a855f718' : 'transparent', color: form.type === t.id ? '#a855f7' : '#8b949e', borderRadius: 10, cursor: 'pointer', fontWeight: 700, fontSize: 12, fontFamily: 'DM Sans, sans-serif', transition: 'all 0.15s' }}>
                                    <div>{t.icon}</div>{t.label}
                                </button>
                            ))}
                        </div>
                    </div>
                    <div style={{ marginBottom: 16 }}><Label>Name</Label><input className="input-field" required placeholder={form.type === 'bank' ? 'Chase Savings' : form.type === 'crypto' ? 'Bitcoin' : 'Gold Bullion'} value={form.name} onChange={e => setForm(f => ({ ...f, name: e.target.value }))} /></div>
                    {form.type === 'metal' ? (
                        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12, marginBottom: 16 }}>
                            <div><Label>Weight (oz)</Label><input className="input-field" type="number" step="0.001" required placeholder="10.0" value={form.weight} onChange={e => setForm(f => ({ ...f, weight: e.target.value }))} /></div>
                            <div><Label>Price per oz ($)</Label><input className="input-field" type="number" step="0.01" required placeholder="1900" value={form.pricePerUnit} onChange={e => setForm(f => ({ ...f, pricePerUnit: e.target.value }))} /></div>
                        </div>
                    ) : (
                        <div style={{ display: 'grid', gridTemplateColumns: form.type === 'crypto' ? '1fr 1fr' : '1fr', gap: 12, marginBottom: 16 }}>
                            <div><Label>Value ($)</Label><input className="input-field" type="number" step="0.01" required placeholder="0.00" value={form.value} onChange={e => setForm(f => ({ ...f, value: e.target.value }))} /></div>
                            {form.type === 'crypto' && <div><Label>Symbol</Label><input className="input-field" placeholder="BTC" value={form.symbol} onChange={e => setForm(f => ({ ...f, symbol: e.target.value }))} /></div>}
                        </div>
                    )}
                    <div style={{ display: 'flex', gap: 10 }}><Btn variant="outline" full onClick={onClose}>Cancel</Btn><Btn variant="primary" type="submit" full>{initial?.id ? 'Update' : 'Add'} Asset</Btn></div>
                </form>
            );
        }

        function DebtForm({ initial, onSave, onClose }) {
            const [form, setForm] = useState({ id: null, name: '', balance: '', minPayment: '', interestRate: '', ...initial });
            return (
                <form onSubmit={e => { e.preventDefault(); onSave({ ...form, id: form.id || null, balance: parseFloat(form.balance || 0), minPayment: parseFloat(form.minPayment || 0), interestRate: parseFloat(form.interestRate || 0) }); }}>
                    <div style={{ marginBottom: 16 }}><Label>Debt Name</Label><input className="input-field" required placeholder="Credit Card, Student Loan…" value={form.name} onChange={e => setForm(f => ({ ...f, name: e.target.value }))} /></div>
                    <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12, marginBottom: 16 }}>
                        <div><Label>Balance ($)</Label><input className="input-field" type="number" step="0.01" min="0" required placeholder="0.00" value={form.balance} onChange={e => setForm(f => ({ ...f, balance: e.target.value }))} /></div>
                        <div><Label>Interest Rate (%)</Label><input className="input-field" type="number" step="0.01" min="0" placeholder="0.00" value={form.interestRate} onChange={e => setForm(f => ({ ...f, interestRate: e.target.value }))} /></div>
                    </div>
                    <div style={{ marginBottom: 24 }}><Label>Minimum Payment ($)</Label><input className="input-field" type="number" step="0.01" min="0" placeholder="0.00" value={form.minPayment} onChange={e => setForm(f => ({ ...f, minPayment: e.target.value }))} /></div>
                    <div style={{ display: 'flex', gap: 10 }}><Btn variant="outline" full onClick={onClose}>Cancel</Btn><Btn variant="danger" type="submit" full>{initial?.id ? 'Update' : 'Add'} Debt</Btn></div>
                </form>
            );
        }

        function BudgetModal({ budgets, onChange, onClose, dark }) {
            const [local, setLocal] = useState({ ...budgets });
            const allCats = Object.keys(CAT_META);
            return (
                <div>
                    <div style={{ maxHeight: 420, overflowY: 'auto', paddingRight: 4, display: 'flex', flexDirection: 'column', gap: 12, marginBottom: 20 }}>
                        {allCats.map(cat => (
                            <div key={cat}>
                                <Label>{CAT_META[cat].icon} {cat}</Label>
                                <input className="input-field" type="number" step="0.01" min="0" placeholder="No budget set" value={local[cat] || ''} onChange={e => setLocal(l => ({ ...l, [cat]: parseFloat(e.target.value) || 0 }))} />
                            </div>
                        ))}
                    </div>
                    <div style={{ display: 'flex', gap: 10 }}>
                        <Btn variant="outline" full onClick={onClose}>Cancel</Btn>
                        <Btn variant="success" full onClick={() => { onChange(local); onClose(); }}>Save Budgets</Btn>
                    </div>
                </div>
            );
        }

        function NetWorthModal({ summary, assets, dark, onClose }) {
            const cardBorder = dark ? '#21262d' : '#d0d7de';
            return (
                <div>
                    <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12, marginBottom: 20 }}>
                        <div style={{ background: '#22c55e10', border: '1px solid #22c55e20', borderRadius: 12, padding: '14px 16px' }}>
                            <p style={{ margin: 0, fontSize: 10, fontWeight: 700, textTransform: 'uppercase', letterSpacing: '0.1em', color: '#22c55e' }}>Total Assets</p>
                            <p className="mono" style={{ margin: '6px 0 0', fontSize: 22, fontWeight: 700, color: '#22c55e' }}>${summary.assetsTotal.toFixed(2)}</p>
                        </div>
                        <div style={{ background: '#3b82f610', border: '1px solid #3b82f620', borderRadius: 12, padding: '14px 16px' }}>
                            <p style={{ margin: 0, fontSize: 10, fontWeight: 700, textTransform: 'uppercase', letterSpacing: '0.1em', color: '#3b82f6' }}>Monthly Surplus</p>
                            <p className="mono" style={{ margin: '6px 0 0', fontSize: 22, fontWeight: 700, color: '#3b82f6' }}>${summary.balance.toFixed(2)}</p>
                        </div>
                    </div>
                    <p style={{ margin: '0 0 12px', fontSize: 10, fontWeight: 700, letterSpacing: '0.1em', textTransform: 'uppercase', color: '#484f58' }}>Asset Allocation</p>
                    {assets.map(a => {
                        const val = a.type === 'metal' ? (a.weight || 0) * (a.pricePerUnit || 0) : (a.value || 0);
                        const pct = summary.assetsTotal > 0 ? (val / summary.assetsTotal) * 100 : 0;
                        return (
                            <div key={a.id} style={{ marginBottom: 14 }}>
                                <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 5 }}>
                                    <span style={{ fontSize: 13, color: dark ? '#e6edf3' : '#24292f', fontWeight: 600 }}>{a.name}</span>
                                    <span className="mono" style={{ fontSize: 12, color: '#8b949e' }}>${val.toFixed(2)} ({pct.toFixed(1)}%)</span>
                                </div>
                                <div style={{ height: 6, background: dark ? '#21262d' : '#e0e0e0', borderRadius: 99, overflow: 'hidden' }}>
                                    <div style={{ height: '100%', width: `${pct}%`, background: '#a855f7', borderRadius: 99, transition: 'width 0.8s ease' }} />
                                </div>
                            </div>
                        );
                    })}
                    {assets.length === 0 && <p style={{ fontSize: 13, color: '#484f58', fontStyle: 'italic' }}>No assets tracked yet. Add some from the sidebar.</p>}
                    <div style={{ borderTop: `1px solid ${cardBorder}`, paddingTop: 16, marginTop: 16, display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 20 }}>
                        <span style={{ fontSize: 16, fontWeight: 700 }}>Total Net Worth</span>
                        <span className="mono" style={{ fontSize: 22, fontWeight: 800, color: '#22c55e' }}>${summary.netWorth.toFixed(2)}</span>
                    </div>
                    <Btn variant="outline" full onClick={onClose}>Close</Btn>
                </div>
            );
        }

        function WalletModal({ wallets, onUpdate, activeWalletId, onSetActive, onClose, dark }) {
            const [name, setName] = useState('');
            const [icon, setIcon] = useState('👤');
            const cardBorder = dark ? '#21262d' : '#d0d7de';
            return (
                <div>
                    <div style={{ display: 'flex', flexDirection: 'column', gap: 8, marginBottom: 20, maxHeight: 240, overflowY: 'auto' }}>
                        {wallets.map(w => (
                            <div key={w.id} style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '10px 14px', background: dark ? '#0d1117' : '#f6f8fa', border: `1px solid ${cardBorder}`, borderRadius: 10 }}>
                                <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                                    <span style={{ fontSize: 20 }}>{w.icon}</span>
                                    <span style={{ fontWeight: 600, fontSize: 14, color: dark ? '#e6edf3' : '#24292f' }}>{w.name}</span>
                                    {w.id === activeWalletId && <span className="tag" style={{ background: '#22c55e10', color: '#22c55e' }}>Active</span>}
                                </div>
                                <div style={{ display: 'flex', gap: 6 }}>
                                    {w.id !== activeWalletId && <Btn size="sm" variant="ghost" onClick={() => onSetActive(w.id)}>Switch</Btn>}
                                    <button onClick={() => {
                                        if (wallets.length <= 1) { alert('Keep at least one wallet.'); return; }
                                        if (window.confirm(`Delete wallet "${w.name}"? Transactions won't be deleted.`)) {
                                            onUpdate(wallets.filter(x => x.id !== w.id));
                                            if (activeWalletId === w.id) onSetActive(wallets.find(x => x.id !== w.id).id);
                                        }
                                    }} style={{ width: 28, height: 28, display: 'flex', alignItems: 'center', justifyContent: 'center', background: 'none', border: 'none', cursor: 'pointer', color: '#484f58', borderRadius: 6 }} onMouseEnter={e => e.currentTarget.style.color = '#f85149'} onMouseLeave={e => e.currentTarget.style.color = '#484f58'}><I.Trash /></button>
                                </div>
                            </div>
                        ))}
                    </div>
                    <div style={{ borderTop: `1px solid ${cardBorder}`, paddingTop: 16, marginBottom: 16 }}>
                        <Label>New Wallet Name</Label>
                        <input className="input-field" placeholder="e.g. Savings, Travel Fund" value={name} onChange={e => setName(e.target.value)} style={{ marginBottom: 10 }} />
                        <div style={{ display: 'flex', gap: 8, marginBottom: 14 }}>
                            {['👤', '💼', '💰', '✈️', '🏠', '🎯'].map(em => (
                                <button key={em} onClick={() => setIcon(em)} style={{ width: 36, height: 36, fontSize: 18, border: '2px solid', borderColor: icon === em ? '#22c55e' : '#30363d', borderRadius: 9, background: icon === em ? '#22c55e10' : 'transparent', cursor: 'pointer' }}>{em}</button>
                            ))}
                        </div>
                        <Btn variant="success" full onClick={() => {
                            if (!name.trim()) return;
                            onUpdate([...wallets, { id: genId(), name: name.trim(), icon }]);
                            setName(''); setIcon('👤');
                        }}><I.Plus /> Add Wallet</Btn>
                    </div>
                    <Btn variant="outline" full onClick={onClose}>Done</Btn>
                </div>
            );
        }

        function MonthPicker({ current, onChange, dark }) {
            const [year, setYear] = useState(dayjs(current).year());
            const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
            const curMonth = dayjs(current).month();
            const curYear = dayjs(current).year();
            return (
                <div>
                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 16 }}>
                        <button onClick={() => setYear(y => y - 1)} style={{ background: 'none', border: 'none', cursor: 'pointer', color: '#8b949e', display: 'flex', padding: 6, borderRadius: 8 }}><I.ChevL /></button>
                        <span style={{ fontWeight: 800, fontSize: 16 }}>{year}</span>
                        <button onClick={() => setYear(y => y + 1)} style={{ background: 'none', border: 'none', cursor: 'pointer', color: '#8b949e', display: 'flex', padding: 6, borderRadius: 8 }}><I.ChevR /></button>
                    </div>
                    <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 8 }}>
                        {months.map((m, i) => {
                            const isActive = i === curMonth && year === curYear;
                            return (
                                <button key={i} onClick={() => onChange(dayjs().year(year).month(i).startOf('month').toDate())} style={{ padding: '10px 0', borderRadius: 10, border: '2px solid', borderColor: isActive ? '#22c55e' : '#30363d', background: isActive ? '#22c55e18' : 'transparent', color: isActive ? '#22c55e' : '#8b949e', fontWeight: 700, fontSize: 12, cursor: 'pointer', fontFamily: 'DM Sans, sans-serif', transition: 'all 0.15s' }}>
                                    {m}
                                </button>
                            );
                        })}
                    </div>
                </div>
            );
        }

        // ─── Render ───────────────────────────────────────────────────────────────────
        try {
            ReactDOM.createRoot(document.getElementById('root')).render(<App />);
        } catch (err) {
            document.getElementById('error-display').style.display = 'block';
            document.getElementById('error-display').textContent = 'Render Error: ' + err.message;
        }
    </script>
</body>
</html>
